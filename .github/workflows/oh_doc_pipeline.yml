name: Auto Generate System Design Docs

# 已临时停用此工作流。
# 原触发配置保留如下，便于后续恢复：
# on:
#   push:
#     paths:
#       - 'oh-story/**.md'
#   workflow_dispatch:
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - uses: Alex907795990/openharness-doc-pipeline@main
        with:
          api_key: ${{ secrets.OPENHARNESS_API_KEY }}
