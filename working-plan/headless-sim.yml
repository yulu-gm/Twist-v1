    action: |
      1. 创建 `src/headless/scenario-runner.ts`。
      2. 实现 `hydrateScenario(sim: HeadlessSim, def: ScenarioDefinition): void`：
         - 按 `def.pawns` 调用 `sim.spawnPawn`。
         - 按 `def.blueprints` 调用 `sim.placeBlueprint`。
         - 按 `def.obstacles` 调用 `sim.spawnObstacle`。
      3. 实现 `runScenarioHeadless(def: ScenarioDefinition): { sim, report, results }`：
         - 创建 HeadlessSim（seed/gridConfig/timeConfig 取自 def）。
         - 调用 `hydrateScenario` 搭建场景。
         - 遍历 `def.expectations`，对每个 expectation 执行 `runUntil` 或 `runTicks` 并生成 `AssertionResult`。
         - 返回 sim + report + results。
      4. 在 `src/headless/index.ts` 中 re-export。
      5. 创建 `tests/headless/scenario-runner.test.ts`，用一个最小 ScenarioDefinition 验证 runner 流程。
    acceptance_criteria: |
