# ============================================================
# Phase 0：先把“怎么设计玩家验收用例”定清楚
# ============================================================
tasks:
  - id: "ACD-01"
    title: "定义 GameScene 玩家验收用例模板与运行边界"
    status: "pending"
    dependencies: []
    coverage_targets:
      - "全局结构性缺口-1"
      - "全局结构性缺口-2"
      - "全局结构性缺口-3"
      - "全局结构性缺口-4"
    context:
      read_files:
        - "working-plan/oh-acceptance-coverage-gap.md"
        - "src/scenes/GameScene.ts"
        - "src/scenes/game-scene-floor-interaction.ts"
        - "src/player/scenario-loader.ts"
        - "src/headless/scenario-runner.ts"
      reference_docs:
        - "working-plan/headless-sim.yml"
    action: |
      1. 输出一份“玩家验收用例模板”，统一定义用例结构：
         - 初始状态约束
         - 玩家入口动作（菜单/按钮/点击/拖拽）
         - 世界状态断言
         - 渲染/UI 可见断言
         - 禁止使用的捷径（如 `domainCommandsAfterHydrate`、`playerSelectionAfterHydrate`、直接改 world）
      2. 明确补充用例设计的运行边界：
         - 哪些场景仍可复用现有 scenario hydrate
         - 哪些步骤必须从玩家输入重放
         - 哪些断言必须落在 Phaser/HUD 可见层
      3. 给出最小“玩家验收链路”定义：
         - 菜单选择工具
         - `pointerdown -> pointermove -> pointerup` 或单击
         - 世界变化
         - HUD/地图反馈
      4. 产出一张“允许复用 / 禁止复用”的设计约束表，供后续所有子任务复用。
      5. 将模板与约束表输出到 `user-test-scene/00-template/`。
    acceptance_criteria: |
      - [ ] 在 `user-test-scene/00-template/` 下新增一份用例模板文档，明确包含“入口动作 / 可见反馈 / 禁用捷径”三类章节。
      - [ ] 文档中明确点名 `domainCommandsAfterHydrate`、`playerSelectionAfterHydrate`、`claimConstructBlueprintAsPawnName` 只能作为对照，不得作为玩家验收主路径。
