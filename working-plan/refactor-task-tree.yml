  - id: "T-03"
    title: "实现实体生命周期规则（树→木头、蓝图→建筑、携带/放下）"
    status: "completed"
    dependencies: ["T-01", "T-02"]
    context:
      read_files:
        - "src/game/entity/entity-types.ts"
        - "src/game/entity/entity-registry.ts"
        - "src/game/world-core.ts"            # 现有 completeDeconstructWork / completeBlueprintWork
      reference_docs:
        - "oh-code-design/实体系统.yaml"      # 关键流程：树木转木头、蓝图转建筑、携带与放下
    action: |
      1. 创建 `src/game/entity/lifecycle-rules.ts`。
      2. 实现以下纯函数（输入 EntityRegistry + 触发参数，返回变更结果）：
         - `transformTreeToResource(registry, treeId)` — 删除树木实体，在原位创建木头物资实体
         - `transformBlueprintToBuilding(registry, blueprintId)` — 删除蓝图，创建建筑实体，返回建筑 id
         - `pickUpResource(registry, pawnId, resourceId)` — 将物资位置设为"被小人携带"
         - `dropResource(registry, pawnId, targetCell)` — 将携带物放置到目标格
      3. 每个函数返回明确的 outcome 联合类型（成功 / 实体不存在 / 冲突等）。
      4. 在 `src/game/entity/index.ts` 中导出。
      5. 创建 `tests/domain/lifecycle-rules.test.ts`，至少覆盖 4 个关键流程各 1 个正向 + 1 个异常用例。
    acceptance_criteria: |
      - [ ] Shell: `npx tsc --noEmit` 无新增报错。
      - [ ] Shell: `npx vitest run tests/domain/lifecycle-rules.test.ts` 全部通过。
      - [ ] Read: `src/game/entity/lifecycle-rules.ts` 必须导出 `transformTreeToResource`、`transformBlueprintToBuilding`、`pickUpResource`、`dropResource`。
      - [ ] Grep: `lifecycle-rules.test.ts` 中至少包含 8 个 `it(` 或 `test(` 调用。

