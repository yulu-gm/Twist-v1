         - `unassignBed(registry, bedId)` — 取消归属
      3. 在 `src/game/entity/index.ts` 中导出。
      4. 创建 `tests/domain/relationship-rules.test.ts`，覆盖正常分配、重复分配冲突、取消分配等场景。
    acceptance_criteria: |
