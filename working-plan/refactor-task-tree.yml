tasks:
  - id: "T-01"
    title: "定义实体类型系统与 6 种原型"
    status: "completed"
    dependencies: []
    context:
      read_files:
        - "src/game/world-core.ts"            # 现有 WorldEntitySnapshot、WorldEntityKind 等类型
        - "src/game/pawn-state.ts"            # 现有 PawnState 类型
      reference_docs:
        - "oh-code-design/实体系统.yaml"      # 目标：6 种实体原型的完整字段定义
    action: |
      1. 创建 `src/game/entity/entity-types.ts`。
      2. 定义 `EntityId`（品牌类型或 string alias）。
      3. 定义 `EntityKind` 联合类型：`"pawn" | "resource" | "tree" | "blueprint" | "building" | "zone"`。
      4. 为每种实体定义类型接口（参照 oh-code-design 核心数据字段）：
         - `PawnEntity`：位置、行为状态、当前目标、携带物标识、饱食度、精力值、床铺归属
         - `ResourceEntity`：物资类型、位置、所在容器类型/标识、可拾取标记、当前占用者
         - `TreeEntity`：位置、伐木标记、是否被占用
         - `BlueprintEntity`：蓝图类型、覆盖格集合、建造进度、建造状态、关联工作标识
         - `BuildingEntity`：建筑类型、覆盖格集合、可交互能力、归属信息
         - `ZoneEntity`：区域类型、覆盖格集合、名称、接受物资类型规则
      5. 导出统一 `GameEntity` 可辨识联合（discriminated union on `kind`）。
      6. 导出 `ReadonlyEntitySnapshot` 只读快照类型。
      7. 创建 `src/game/entity/index.ts` 作为桶文件，重新导出所有类型。
    acceptance_criteria: |
      - [ ] Shell: `npx tsc --noEmit` 无新增报错。
      - [ ] Read: `src/game/entity/entity-types.ts` 必须导出 `EntityId`、`EntityKind`、`PawnEntity`、`ResourceEntity`、`TreeEntity`、`BlueprintEntity`、`BuildingEntity`、`ZoneEntity`、`GameEntity`、`ReadonlyEntitySnapshot`。
      - [ ] Read: `src/game/entity/index.ts` 必须重新导出上述所有类型。
      - [ ] Grep: `entity-types.ts` 中 `PawnEntity` 必须包含 `satiety`（饱食度）和 `energy`（精力值）字段。

