      2. 实现 `EntityRegistry` 类或一组纯函数，提供：
         - `create(draft): GameEntity` — 分配 EntityId 并注册
         - `remove(id): void`
         - `get(id): GameEntity | undefined`
         - `getByKind(kind): GameEntity[]`
         - `getByCell(cell): GameEntity[]` — 按位置查询
