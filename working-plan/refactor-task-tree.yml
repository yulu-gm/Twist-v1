      2. 实现以下约束检查和维护函数：
         - `validateBedOwnership(registry)` — 确保一张床只归属一个小人
         - `validateResourceLocation(registry)` — 确保一份物资只在一个位置/容器
         - `validateCarrying(registry)` — 确保一个小人最多携带一个物资
