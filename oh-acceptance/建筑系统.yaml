system_name: "建筑系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/建筑系统.yaml"
code_design_ref: "oh-code-design/建筑系统.yaml"

scenarios:
  - scenario_id: "BUILD-001"
    name: "绘制连续墙体蓝图"
    type: "happy-path"
    intent: "验证玩家使用蓝图笔刷可以成功在地图上生成墙体蓝图，并触发建造工作"
    given:
      - "玩家处于 '墙体蓝图绘制模式'"
      - "玩家在地图上拖拽划过的地图格均合法且无阻挡"
    when: "玩家释放鼠标，提交蓝图绘制路径"
    then:
      domain_state:
        - "蓝图管理器在对应的地图格上创建 '墙体蓝图' 实体"
        - "蓝图的初始建造进度为 0%"
        - "工作系统自动为这些蓝图生成对应的 '建造' 工作"
      presentation:
        - "地图上对应的格子上显示半透明的墙体蓝图虚影"

  - scenario_id: "BUILD-002"
    name: "蓝图施工完成转化为实体"
    type: "happy-path"
    intent: "验证小人完成建造工作后，蓝图能正确转化为真实的建筑实体"
    given:
      - "地图上存在一个 '墙体蓝图'"
      - "小人正在该蓝图旁执行 '建造' 工作"
    when: "建造工作进度读条达到 100%"
    then:
      domain_state:
        - "蓝图管理器移除该 '墙体蓝图' 实体"
        - "建成结算器在相同位置生成真实的 '墙体' 建筑实体"
        - "地图系统的占用管理器更新该格为阻挡通行状态（针对墙体）"
      presentation:
        - "地图上的半透明虚影替换为真实的墙体模型"
        - "建造进度条消失"

  - scenario_id: "BUILD-003"
    name: "木床建成后的自动分配"
    type: "integration"
    intent: "验证具有归属属性的家具（如木床）在建成后，能自动分配给无床小人"
    given:
      - "地图上存在一个 '木床蓝图'"
      - "至少有一名小人当前 '所属床铺' 为空"
    when: "木床的建造工作进度达到 100%，触发建成结算"
    then:
      domain_state:
        - "生成真实的 '木床' 建筑实体"
        - "归属规则器查找到一名无床小人，并将该木床的 '所有者' 指派给该小人"
        - "该小人的 '所属床铺' 属性更新为该木床的引用"
      presentation:
        - "木床模型渲染在地图上"
        - "选中木床或小人时，UI 状态面板显示其归属关系"

  - scenario_id: "BUILD-004"
    name: "蓝图放置位置冲突"
    type: "edge-case"
    intent: "验证当玩家试图在已有阻挡物的格子上放置蓝图时会被拒绝"
    given:
      - "玩家处于蓝图放置模式"
      - "目标地图格上已经存在墙体或树木等阻挡实体"
    when: "建造校验器检查目标格的合法性"
    then:
      domain_state:
        - "建造校验器返回不可放置结果"
        - "蓝图管理器拒绝在该格创建蓝图实体"
        - "不生成对应的建造工作"
      presentation:
        - "悬停在冲突格子时，蓝图虚影显示为红色警告样式"
        - "点击放置时无有效蓝图生成"
