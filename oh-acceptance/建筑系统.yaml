system_name: "建筑系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/建筑系统.yaml"
code_design_ref: "oh-code-design/建筑系统.yaml"

scenarios:
  - scenario_id: "BUILD-001"
    name: "基础墙体蓝图放置与建造"
    type: "happy-path"
    intent: "验证玩家可以通过拖拽绘制墙体蓝图，并且小人能完成建造将其转化为实体"
    
    given:
      - "地图上存在合法的空地"
      - "存在处于空闲状态的小人"
      
    when: "玩家使用木墙蓝图笔刷在空地上绘制连续的墙体蓝图"
    
    then:
      domain_state: 
        - "蓝图管理器批量创建对应坐标的墙体蓝图记录，进度为0"
        - "工作系统生成对应的建造工作任务"
        - "小人接取任务并完成读条后，蓝图记录被移除，建成结算器在对应坐标生成墙体建筑实体"
      presentation: 
        - "蓝图放置时在地图上显示墙体的虚影"
        - "小人移动到蓝图旁播放建造动作或读条UI"
        - "建造完成后虚影变为真实的木墙模型"

  - scenario_id: "BUILD-002"
    name: "木床建造完成后的自动分配"
    type: "happy-path"
    intent: "验证木床建成后会自动分配给没有床铺的小人"
    
    given:
      - "存在一名没有分配床铺的小人"
      - "玩家放置了一个木床蓝图"
      
    when: "小人完成木床的建造工作，触发建成结算"
    
    then:
      domain_state: 
        - "建成结算器生成木床实体"
        - "归属规则器将该木床的归属记录绑定到该无床小人的标识上"
      presentation: 
        - "木床模型正常出现"
        - "选中床铺时UI显示其所有者为该小人"

  - scenario_id: "BUILD-003"
    name: "非法位置的蓝图放置拦截"
    type: "edge-case"
    intent: "验证在被阻挡或非法的地块上无法放置建筑蓝图"
    
    given:
      - "地图某格已被其他阻挡通行的实体占据"
      
    when: "玩家尝试在该格放置建筑蓝图"
    
    then:
      domain_state: 
        - "建造校验器拦截放置请求，返回空间不合法"
        - "蓝图管理器不创建蓝图记录"
        - "不生成任何建造工作任务"
      presentation: 
        - "蓝图虚影显示为红色或不可放置状态"
        - "点击或拖拽时无响应或播放失败音效"

  - scenario_id: "BUILD-004"
    name: "床铺数量多于无床小人时的分配"
    type: "edge-case"
    intent: "验证当建成的床铺多于需要的小人时，多余的床铺保持无归属状态"
    
    given:
      - "所有小人都已经拥有归属的床铺"
      
    when: "一张新的木床被建造完成"
    
    then:
      domain_state: 
        - "归属规则器筛选不到尚未拥有床铺的小人"
        - "该木床实体的归属记录保持为空（无归属状态）"
      presentation: 
        - "木床模型正常出现"
        - "选中该木床时UI显示无所有者"
