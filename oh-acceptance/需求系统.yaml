system_name: "需求系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/需求系统.yaml"
code_design_ref: "oh-code-design/需求系统.yaml"

scenarios:
  - scenario_id: "NEED-001"
    name: "饱食度随时间下降触发饥饿"
    type: "happy-path"
    intent: "验证时间推进会导致饱食度下降，并在低于阈值时产生紧急进食需求"
    given:
      - "小人处于正常活动状态，饱食度初始为满"
      - "需求规则配置了饱食度下降速率和饥饿阈值"
    when: "时间系统持续推进，需求演化引擎扣除饱食度，使其低于饥饿阈值"
    then:
      domain_state:
        - "小人的需求快照中，饱食度数值低于警戒线"
        - "阈值规则集将小人的饥饿阶段更新为 '饥饿'"
        - "需求计算层向行为系统输出高优先级的 '进食' 行动建议"
      presentation:
        - "UI 状态面板显示小人饱食度条变红或出现饥饿图标"

  - scenario_id: "NEED-002"
    name: "进食行为恢复饱食度"
    type: "integration"
    intent: "验证小人执行进食行为后，饱食度能正确恢复，解除饥饿状态"
    given:
      - "小人处于 '饥饿' 状态，并已成功寻找到食物"
    when: "行为系统确认小人进入 '满足需求-进食中' 状态，并持续一定时间"
    then:
      domain_state:
        - "需求满足结算器根据进食时长或食物属性增加饱食度数值"
        - "当饱食度恢复满（或超过阈值）时，饥饿阶段重置为 '正常'"
        - "撤销高优先级的 '进食' 行动建议，允许小人返回空闲或工作状态"
      presentation:
        - "小人坐在地上播放进食动画"
        - "进食结束后，饥饿警告图标消失"

  - scenario_id: "NEED-003"
    name: "夜晚疲劳触发睡眠需求"
    type: "happy-path"
    intent: "验证精力值在白天下降后，能在夜晚触发寻找床铺休息的行为"
    given:
      - "时间系统广播 '夜晚开始' 事件"
      - "小人的精力值在白天活动后已低于疲劳阈值"
    when: "需求演化引擎重估疲劳状态"
    then:
      domain_state:
        - "小人的疲劳阶段更新为 '疲劳'"
        - "需求计算层输出高优先级的 '休息' 行动建议，目标指向其归属的床铺"
        - "行为系统打断当前普通工作，驱动小人前往床铺"
      presentation:
        - "小人头顶出现睡眠/疲劳图标"
        - "小人放弃当前工作，走向自己的木床"

  - scenario_id: "NEED-004"
    name: "无床铺时的疲劳降级处理"
    type: "edge-case"
    intent: "验证当小人极度疲劳但没有分配到床铺时，不会卡死，而是有合理的降级表现（如就地昏睡）"
    given:
      - "小人的精力值降至极低（如 0）"
      - "小人的 '床铺归属' 为空，且地图上没有可用的无主床铺"
    when: "需求系统强制要求休息，但行为系统找不到床铺目标"
    then:
      domain_state:
        - "需求行动建议无法锁定床铺目标"
        - "行为系统触发降级逻辑，小人主状态变为 '满足需求'，子状态为 '就地休息'"
        - "需求满足结算器以较低的速率恢复精力值"
      presentation:
        - "小人直接在当前所在的地图格上躺下播放睡眠动画"
        - "可能弹出 '缺少床铺' 的抱怨气泡"
