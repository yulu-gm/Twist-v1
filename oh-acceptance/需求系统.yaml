system_name: "需求系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/需求系统.yaml"
code_design_ref: "oh-code-design/需求系统.yaml"

scenarios:
  - scenario_id: "NEED-001"
    name: "饱食度随时间下降并触发进食"
    type: "happy-path"
    intent: "验证时间推进会导致饱食度下降，并在低于阈值时触发进食行为和恢复"
    
    given:
      - "小人处于正常活动状态"
      - "地图上存在包装食品"
      
    when: "游戏时间持续推进，需求演化引擎计算饱食度下降，直至低于警戒阈值"
    
    then:
      domain_state: 
        - "阈值规则集将饱食度阶段更新为'饥饿'"
        - "需求系统向行为系统输出高优先级的进食行动建议"
        - "小人完成进食行为后，需求满足结算器将饱食度恢复至满值"
      presentation: 
        - "UI需求面板中饱食度条逐渐减少并变色警告"
        - "小人头顶可能出现饥饿提示图标"
        - "进食完成后饱食度条回满"

  - scenario_id: "NEED-002"
    name: "夜晚疲劳触发睡眠与精力恢复"
    type: "happy-path"
    intent: "验证白天活动消耗精力，夜晚触发睡眠并在睡眠期间恢复精力"
    
    given:
      - "小人在白天持续活动，精力值逐渐下降"
      - "小人已分配有归属的木床"
      
    when: "时间系统广播进入夜晚事件，且精力值低于阈值"
    
    then:
      domain_state: 
        - "阈值规则集将精力阶段更新为'疲劳'"
        - "需求系统向行为系统输出高优先级的休息行动建议"
        - "小人进入休息状态后，需求满足结算器随时间持续增加精力值"
      presentation: 
        - "UI需求面板中精力值条显示为低水平"
        - "小人在床上播放睡眠动画"
        - "睡眠期间精力值条持续上涨"

  - scenario_id: "NEED-003"
    name: "进食行为被强行中断"
    type: "edge-case"
    intent: "验证如果进食过程被意外打断，饱食度只恢复部分或不恢复"
    
    given:
      - "小人处于饥饿状态并刚刚开始进食读条"
      
    when: "玩家强制命令或更高级事件导致进食行为在完成前被中断"
    
    then:
      domain_state: 
        - "行为系统通知需求系统进食提前结束"
        - "需求满足结算器仅结算已发生时间段的饱食度恢复量，未达到满值"
        - "饱食度阶段可能仍处于'饥饿'或稍有缓解"
      presentation: 
        - "进食动画和读条中途停止"
        - "饱食度条仅恢复了一小段"

  - scenario_id: "NEED-004"
    name: "极度饥饿/疲劳的惩罚边界"
    type: "edge-case"
    intent: "验证当需求值降至0时系统的兜底处理机制"
    
    given:
      - "小人处于饥饿或疲劳状态"
      - "地图上没有食物或床铺供其恢复"
      
    when: "时间继续推进，饱食度或精力值降至0"
    
    then:
      domain_state: 
        - "需求演化引擎将数值锁定在0，不出现负数"
        - "阈值规则集将其标记为'极度紧急'阶段"
        - "向行为系统持续输出最高优先级的需求压力"
      presentation: 
        - "需求条清空并闪烁红色"
        - "小人可能表现出极度虚弱的移动动画或昏倒（视具体表现层实现）"
