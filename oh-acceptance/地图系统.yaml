system_name: "地图系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/地图系统.yaml"
code_design_ref: "oh-code-design/地图系统.yaml"

scenarios:
  - scenario_id: "MAP-001"
    name: "游戏初始地图生成与实体分布"
    type: "happy-path"
    intent: "验证游戏开局时，地图网格正确初始化，且小人、物资和树木被正确放置在地图格上"
    given:
      - "游戏处于初始加载阶段"
      - "地图配置指定了初始尺寸和生成规则"
    when: "地图系统完成初始化"
    then:
      domain_state:
        - "地图网格生成完毕，所有合法坐标的地图格可被索引"
        - "初始小人、散落物资、树木、岩石实体被注册到对应地图格的 '占用对象集合' 或 '包含实体' 列表中"
        - "所有初始地图格的 '可通行状态' 根据其上的实体（如树木可能阻挡）正确设置"
      presentation:
        - "渲染引擎正确绘制出地块网格"
        - "小人、物资、树木、岩石的模型在对应的地图坐标上正确渲染"

  - scenario_id: "MAP-002"
    name: "玩家框选创建存储区"
    type: "happy-path"
    intent: "验证玩家通过选区工具框选合法地图格后，能成功创建并注册存储区"
    given:
      - "玩家选中了 '区域-存储区-新建' 工具"
      - "目标地图格区域在地图范围内，且合法可用"
    when: "玩家在地图上拖拽鼠标完成矩形框选，选区解析器提交格坐标集合"
    then:
      domain_state:
        - "区域管理器成功创建一个新的 '存储区' 对象"
        - "该存储区的 '覆盖格集合' 包含了玩家框选的所有合法地图格坐标"
        - "这些地图格被标记为属于该存储区"
      presentation:
        - "被框选的地图格上出现存储区的可视化高亮或边界线"
        - "UI 面板在选中该区域时显示存储区信息"

  - scenario_id: "MAP-003"
    name: "框选区域包含越界或不可用地图格"
    type: "edge-case"
    intent: "验证选区解析器能正确过滤无效坐标，防止区域系统崩溃或产生非法区域"
    given:
      - "玩家选中了 '区域-存储区-新建' 工具"
      - "玩家拖拽的矩形选区部分超出了地图最大边界，或包含了不可用于存储的特殊地形格"
    when: "玩家完成框选，选区解析器处理输入坐标"
    then:
      domain_state:
        - "选区解析器自动剔除越界坐标和不可用格"
        - "区域管理器仅使用过滤后的合法格坐标集合创建 '存储区'"
        - "如果过滤后合法格数量为 0，则不创建存储区对象"
      presentation:
        - "只有合法的地图格显示存储区高亮"
        - "越界或不可用区域不会有任何存储区视觉反馈，可能播放错误提示音"

  - scenario_id: "MAP-004"
    name: "建筑蓝图放置时的空间占用检测"
    type: "integration"
    intent: "验证地图系统能正确响应建筑系统的占用查询，阻止在已有阻挡物的格子上重叠建造"
    given:
      - "地图某坐标格上已经存在一个阻挡通行的实体（如：树木或已建成的墙）"
      - "玩家尝试在该坐标格上放置新的建筑蓝图"
    when: "建筑系统向地图系统的占用管理器发起放置合法性校验"
    then:
      domain_state:
        - "占用管理器检查该格的 '占用对象集合'"
        - "占用管理器返回不可放置（冲突）的校验结果"
        - "建筑系统拒绝在该坐标生成蓝图实体"
      presentation:
        - "鼠标悬停在该格子时，蓝图虚影显示为红色（不可放置状态）"
        - "点击时可能触发错误提示音或 UI 警告"
