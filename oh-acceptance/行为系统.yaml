system_name: "行为系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/行为系统.yaml"
code_design_ref: "oh-code-design/行为系统.yaml"

scenarios:
  - scenario_id: "BEHAVIOR-001"
    name: "空闲状态下的默认散步行为"
    type: "happy-path"
    intent: "验证小人在无工作和无紧迫需求时，会自动进入散步状态并在地图上随机移动"
    given:
      - "小人当前主状态为 '空闲'"
      - "工作队列中没有任何可执行的工作候选"
      - "小人的饱食度和精力值均高于紧急阈值"
    when: "系统执行行为决策 Tick"
    then:
      domain_state:
        - "小人的主状态保持为 '空闲'"
        - "小人的子状态或当前目标更新为 '漫无目的散步' 的随机相邻地图格"
        - "小人的坐标随时间向目标地图格平滑移动"
      presentation:
        - "小人模型在地图上播放移动动画"
        - "UI 选中该小人时，状态面板显示 '正在散步' 或 '空闲'"

  - scenario_id: "BEHAVIOR-002"
    name: "检测到新工作时的状态转换"
    type: "happy-path"
    intent: "验证小人能正确从空闲状态切换到移动并执行工作"
    given:
      - "小人当前主状态为 '空闲'"
      - "工作系统中存在一个优先级最高且可达的待执行工作（如：伐木）"
    when: "系统执行行为决策 Tick"
    then:
      domain_state:
        - "小人的主状态转换为 '移动'"
        - "小人的当前目标锁定为该工作所在位置"
        - "到达目标位置后，主状态转换为 '执行工作'，子状态转换为 '伐木中'"
      presentation:
        - "小人模型朝向工作目标位置移动"
        - "到达后，小人播放伐木动画，并在头顶或 UI 面板显示工作进度条"

  - scenario_id: "BEHAVIOR-003"
    name: "工作执行中被紧急需求打断"
    type: "edge-case"
    intent: "验证生理需求（如饥饿）优先级高于普通工作，能正确打断当前行为"
    given:
      - "小人当前主状态为 '执行工作'，正在进行某项耗时工作（如：建造中）"
      - "小人的饱食度下降至低于饥饿阈值"
      - "地图上存在可获取的食物（如：包装食品）"
    when: "需求系统发出紧急需求信号，行为系统触发重评估"
    then:
      domain_state:
        - "小人立即中止当前工作，工作进度保留或重置（依工作系统规则）"
        - "小人的主状态转换为 '移动'，目标锁定为食物所在位置"
        - "到达食物位置后，主状态转换为 '满足需求'，子状态转换为 '进食中'"
      presentation:
        - "小人停止播放建造动画，工作进度条消失"
        - "小人模型转向食物并移动，UI 状态面板更新为 '前往进食'"

  - scenario_id: "BEHAVIOR-004"
    name: "需求无法满足时的行为降级"
    type: "edge-case"
    intent: "验证当产生紧急需求但地图上没有对应资源时，小人不会卡死，而是有合理的降级或等待表现"
    given:
      - "小人的饱食度低于饥饿阈值"
      - "地图上没有任何可获取的食物资源"
    when: "行为系统尝试为饥饿需求寻找目标位置"
    then:
      domain_state:
        - "行动评分器无法为进食需求生成有效路径/目标"
        - "小人状态无法进入 '满足需求' 的移动阶段"
        - "小人主状态维持 '空闲'（或进入特殊的 '挨饿迷茫' 状态），等待资源出现"
      presentation:
        - "小人头顶可能弹出 '找不到食物' 的气泡提示或警告图标"
        - "小人模型在原地徘徊或播放饥饿待机动画"

  - scenario_id: "BEHAVIOR-005"
    name: "开采工作状态切换与执行"
    type: "happy-path"
    intent: "验证小人能正确进入开采中子状态并执行开采行为"
    given:
      - "小人当前主状态为 '空闲'"
      - "工作系统中存在一个优先级最高且可达的 '开采' 工作"
    when: "系统执行行为决策 Tick"
    then:
      domain_state:
        - "小人的主状态转换为 '移动'，目标锁定为岩石位置"
        - "到达目标位置后，主状态转换为 '执行工作'，子状态转换为 '开采中'"
      presentation:
        - "小人模型朝向岩石移动"
        - "到达后，小人播放开采动画，并在头顶或 UI 面板显示开采进度条"
