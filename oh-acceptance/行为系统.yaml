system_name: "行为系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/行为系统.yaml"
code_design_ref: "oh-code-design/行为系统.yaml"

scenarios:
  - scenario_id: "BEHAVIOR-001"
    name: "空闲小人的漫无目的散步"
    type: "happy-path"
    intent: "验证小人在无工作且无紧迫需求时会进入空闲状态并随机散步"
    
    given:
      - "小人处于空闲状态"
      - "当前没有可执行的工作"
      - "小人的饱食度与精力值处于正常区间"
      
    when: "行为系统进行决策更新"
    
    then:
      domain_state: 
        - "行为上下文汇总器未发现紧急需求或候选工作"
        - "行为状态机维持在空闲状态"
        - "行动评分器选择散步行动，小人开始向随机相邻可行走地块移动"
      presentation: 
        - "小人在地图上随机走动"
        - "UI状态面板显示小人处于'空闲/散步'状态"

  - scenario_id: "BEHAVIOR-002"
    name: "空闲状态转为执行工作"
    type: "happy-path"
    intent: "验证小人检测到工作后能中断散步并前往执行"
    
    given:
      - "小人当前处于空闲状态并在散步"
      - "工作系统生成了一个新的伐木工作"
      
    when: "行为系统进行下一个决策周期"
    
    then:
      domain_state: 
        - "行为上下文汇总器获取到候选工作"
        - "行动评分器将伐木工作评为最高优先级"
        - "行为状态机切换为移动状态，目标锁定为树木位置"
      presentation: 
        - "小人停止随机走动，径直走向目标树木"
        - "UI状态面板显示小人正在'前往伐木'"

  - scenario_id: "BEHAVIOR-003"
    name: "工作被紧急生理需求打断"
    type: "edge-case"
    intent: "验证当饱食度或精力值低于阈值时，小人会放弃当前工作优先满足需求"
    
    given:
      - "小人当前处于'执行工作状态'（如正在伐木读条）"
      - "时间推进导致小人的饱食度降至紧急阈值以下"
      - "地图上存在可获取的食物"
      
    when: "需求系统发出紧急需求信号并触发行为决策"
    
    then:
      domain_state: 
        - "行动评分器判定进食行动的优先级高于当前工作"
        - "行为状态机中断当前工作执行，切换为移动状态，目标锁定为食物位置"
        - "原工作被释放回工作队列或保留部分进度"
      presentation: 
        - "小人中断伐木动作和读条"
        - "小人转身走向食物"
        - "UI状态面板显示小人正在'寻找食物'"

  - scenario_id: "BEHAVIOR-004"
    name: "无可用资源时的需求打断处理"
    type: "edge-case"
    intent: "验证当产生紧急需求但无法满足时（如无食物/无床），小人的行为表现"
    
    given:
      - "小人的精力值降至紧急阈值以下（需要睡觉）"
      - "地图上没有任何可用的床铺或该小人未分配到床铺"
      
    when: "行为系统尝试切换到满足需求状态"
    
    then:
      domain_state: 
        - "行为上下文汇总器无法找到有效的床铺目标"
        - "行动评分器无法生成有效的休息行动"
        - "状态机可能退回空闲散步或保持某种'疲劳等待'的特殊状态（视具体实现而定）"
      presentation: 
        - "小人可能在原地徘徊或显示疲劳/抱怨的表情气泡"
        - "UI状态面板显示'极度疲劳但无床铺'"
