system_name: "交互系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/交互系统.yaml"
code_design_ref: "oh-code-design/交互系统.yaml"

scenarios:
  - scenario_id: "INTERACT-001"
    name: "使用选区工具标记物资可拾取"
    type: "happy-path"
    intent: "验证玩家能通过拖拽选区框批量标记散落物资"
    
    given:
      - "玩家选择了'物资拾取标记工具'，进入拾取标记模式"
      - "地图上散落着多个未标记的物资"
      
    when: "玩家按下鼠标拖拽出一个包含这些物资的矩形选区，然后释放鼠标"
    
    then:
      domain_state: 
        - "选区会话管理器收集拖拽范围并输出命中格集合"
        - "交互命令生成器过滤出格内的物资实体，并生成'标记可拾取'命令"
        - "实体系统接收命令并更新这些物资的可拾取状态"
      presentation: 
        - "拖拽时显示半透明选区框"
        - "释放后，被选中的物资上方出现'可拾取'标记图标"

  - scenario_id: "INTERACT-002"
    name: "使用蓝图笔刷连续绘制墙体"
    type: "happy-path"
    intent: "验证玩家能通过拖拽笔刷在路径上连续生成建筑蓝图"
    
    given:
      - "玩家通过菜单进入'建造-墙-木墙'的蓝图绘制模式"
      
    when: "玩家在地图上按下鼠标并拖拽划过一条路径，最后释放"
    
    then:
      domain_state: 
        - "笔刷会话管理器记录划过的去重格坐标集合"
        - "交互命令生成器产出批量创建墙体蓝图的命令"
        - "建筑系统接收命令并在合法格上生成蓝图实体"
      presentation: 
        - "拖拽过程中，划过的路径上实时显示木墙的半透明虚影"
        - "释放鼠标后，虚影固定为等待建造的蓝图状态"

  - scenario_id: "INTERACT-003"
    name: "单点点击放置家具"
    type: "happy-path"
    intent: "验证玩家能在指定单格位置点击放置家具蓝图"
    
    given:
      - "玩家通过菜单进入'家具-木床'的放置模式"
      
    when: "玩家在地图房间内的某个合法空地上点击鼠标"
    
    then:
      domain_state: 
        - "交互模式层识别为单点确认输入"
        - "交互命令生成器产出在目标格创建木床蓝图的命令"
        - "建筑系统接收并在该格生成木床蓝图实体"
      presentation: 
        - "鼠标悬停时显示木床虚影"
        - "点击后虚影固定，生成建造任务提示"

  - scenario_id: "INTERACT-004"
    name: "无效交互模式下的输入屏蔽"
    type: "edge-case"
    intent: "验证当玩家未处于任何有效工具模式时，拖拽或点击不会产生意外的领域命令"
    
    given:
      - "玩家处于默认的观察状态，未选择任何工具或建造菜单"
      
    when: "玩家在地图上随意拖拽或点击"
    
    then:
      domain_state: 
        - "模式注册表判定当前无激活的输入解释规则"
        - "不生成任何交互命令，不修改任何实体或区域状态"
      presentation: 
        - "可能触发地图平移（如果支持），但不显示选区框、虚影或标记"
        - "游戏世界状态保持不变"
