system_name: "交互系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/交互系统.yaml"
code_design_ref: "oh-code-design/交互系统.yaml"

scenarios:
  - scenario_id: "INTERACT-001"
    name: "矩形选区拖拽与命令生成"
    type: "happy-path"
    intent: "验证选区工具能正确捕获玩家拖拽输入，并转化为包含合法坐标的领域命令"
    given:
      - "玩家处于 '物资拾取标记模式'"
    when: "玩家按下鼠标，拖拽形成一个 2x2 的矩形区域，然后释放鼠标"
    then:
      domain_state:
        - "选区会话管理器计算出拖拽起点到终点的 4 个地图格坐标"
        - "交互命令生成器产出 '标记物资可拾取' 命令，目标格集合包含这 4 个坐标"
        - "命令被正确提交给实体系统进行过滤和标记"
      presentation:
        - "拖拽过程中，屏幕实时渲染 2x2 的半透明选区框"
        - "释放鼠标后，选区框消失，选区内的物资出现标记图标"

  - scenario_id: "INTERACT-002"
    name: "蓝图笔刷的连续路径捕获"
    type: "happy-path"
    intent: "验证笔刷工具能将玩家的连续拖拽轨迹转换为去重的坐标集合"
    given:
      - "玩家处于 '墙体蓝图绘制模式'"
    when: "玩家按下鼠标并划过一条包含 5 个格子的 L 形路径，然后释放"
    then:
      domain_state:
        - "笔刷会话管理器记录划过的所有格子，并进行去重"
        - "交互命令生成器产出 '创建墙体蓝图' 命令，目标格集合为这 5 个坐标"
        - "命令提交给建筑系统进行放置校验"
      presentation:
        - "拖拽过程中，划过的格子上依次出现墙体蓝图虚影"
        - "即使鼠标在同一个格子上反复移动，虚影也只渲染一次"

  - scenario_id: "INTERACT-003"
    name: "单点点击放置家具"
    type: "happy-path"
    intent: "验证家具放置模式支持单次点击输入，不需要拖拽框选"
    given:
      - "玩家处于 '家具放置模式'（如木床）"
    when: "玩家在地图某个合法空地上单击鼠标（按下并立即释放，无明显位移）"
    then:
      domain_state:
        - "输入采集层识别为单点点击事件"
        - "交互命令生成器产出 '放置木床蓝图' 命令，目标格仅包含被点击的 1 个坐标"
      presentation:
        - "点击瞬间，目标格子上生成木床蓝图虚影"

  - scenario_id: "INTERACT-004"
    name: "无目标选区的静默处理"
    type: "edge-case"
    intent: "验证当玩家框选了空白区域或无效目标时，系统不会崩溃且不产生副作用"
    given:
      - "玩家处于 '伐木标记模式'"
    when: "玩家框选了一片完全没有树木的空地"
    then:
      domain_state:
        - "选区会话管理器正常输出坐标集合"
        - "交互命令生成器提交标记命令，但实体系统在目标格中找不到树木实体"
        - "系统静默结束处理，不生成任何工作单，不抛出异常"
      presentation:
        - "选区框正常显示并消失"
        - "地图上没有任何变化，也没有错误弹窗阻断游戏"

  - scenario_id: "INTERACT-005"
    name: "岩石开采标记与命令生成"
    type: "happy-path"
    intent: "验证选区工具能正确捕获开采标记操作，并转化为领域命令"
    given:
      - "玩家处于 '开采标记模式'"
    when: "玩家拖拽鼠标框选包含岩石的地图区域，然后释放"
    then:
      domain_state:
        - "选区会话管理器输出命中格与岩石目标"
        - "交互命令生成器产出 '标记岩石开采' 命令"
        - "命令被正确提交给实体系统进行过滤和标记"
      presentation:
        - "拖拽过程中渲染半透明选区框"
        - "释放鼠标后，被框选的岩石出现开采标记图标"
