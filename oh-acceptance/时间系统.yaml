system_name: "时间系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/时间系统.yaml"
code_design_ref: "oh-code-design/时间系统.yaml"

scenarios:
  - scenario_id: "TIME-001"
    name: "游戏时间随现实时间实时推进"
    type: "happy-path"
    intent: "验证游戏时钟能正确将现实时间增量转换为游戏时间进度"
    given:
      - "游戏处于正常运行状态（未暂停）"
      - "时间换算器配置了固定的现实与游戏时间比率"
    when: "主循环传入现实时间的帧间隔（Delta Time）"
    then:
      domain_state:
        - "游戏时钟的 '日内进度' 按照换算比率正确增加"
        - "时间事件总线向外广播细粒度的 '时间片推进' 事件"
      presentation:
        - "UI 上的游戏时间时钟平滑走动"
        - "依赖时间的读条（如伐木进度）平滑增长"

  - scenario_id: "TIME-002"
    name: "昼夜时段切换与事件广播"
    type: "integration"
    intent: "验证当日内进度跨越配置的阈值时，能正确触发白天到夜晚的切换"
    given:
      - "当前时段为 '白天'"
      - "日内进度即将达到 '夜晚阈值'"
    when: "游戏时钟推进，日内进度超过夜晚阈值"
    then:
      domain_state:
        - "时段判定器将当前时段更新为 '夜晚'"
        - "时间事件总线广播 '夜晚开始' 事件"
        - "需求系统和行为系统接收到事件并触发疲劳结算"
      presentation:
        - "地图光照或色调逐渐变暗，呈现夜晚视觉效果"
        - "UI 时间面板显示当前为夜晚"

  - scenario_id: "TIME-003"
    name: "跨天归一化处理"
    type: "happy-path"
    intent: "验证当一天的时间走完后，天数正确增加，日内进度正确重置"
    given:
      - "当前为第 1 天，时段为 '夜晚'"
      - "日内进度即将达到 '每日总时长'"
    when: "游戏时钟推进，日内进度超过每日总时长"
    then:
      domain_state:
        - "时间快照中的 '第几天' 计数增加为 2"
        - "日内进度减去每日总时长，保留溢出的时间余量"
        - "时段判定器重新计算，将时段切回 '白天'"
        - "广播 '跨天' 和 '白天开始' 事件"
      presentation:
        - "UI 日期显示变为 '第 2 天'"
        - "地图光照重新变亮，呈现清晨视觉效果"

  - scenario_id: "TIME-004"
    name: "游戏暂停阻断时间流逝"
    type: "edge-case"
    intent: "验证玩家触发暂停后，所有基于游戏时间的逻辑完全冻结"
    given:
      - "游戏正常运行，小人正在移动或读条"
    when: "玩家通过 UI 或快捷键触发 '暂停' 指令"
    then:
      domain_state:
        - "游戏时钟的 '是否暂停' 状态变为 true"
        - "时间换算器输出的游戏时间增量强制为 0"
        - "时间事件总线停止广播时间片推进事件"
        - "工作进度、需求衰减、小人移动全部冻结"
      presentation:
        - "UI 显示明显的 '已暂停' 提示"
        - "所有小人动画停止，进度条定格，世界静止"
