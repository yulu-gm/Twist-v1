system_name: "时间系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/时间系统.yaml"
code_design_ref: "oh-code-design/时间系统.yaml"

scenarios:
  - scenario_id: "TIME-001"
    name: "游戏时间的实时推进与昼夜切换"
    type: "happy-path"
    intent: "验证现实时间能正确转换为游戏时间，并触发昼夜时段的自然切换"
    
    given:
      - "游戏处于正常运行状态（未暂停）"
      - "当前为第一天白天，日内进度接近夜晚阈值"
      
    when: "主循环持续提供现实时间增量"
    
    then:
      domain_state: 
        - "时间换算器正确累加游戏时间"
        - "当日内进度跨过夜晚阈值时，时段判定器将当前时段更新为'夜晚'"
        - "时间事件总线向外广播'夜晚开始'事件"
      presentation: 
        - "UI时钟面板的时间数字或指针正常走动"
        - "环境光照或天空盒平滑过渡为夜晚效果"

  - scenario_id: "TIME-002"
    name: "跨天归一化处理"
    type: "happy-path"
    intent: "验证当一天的时间走完后，天数正确增加且日内进度重置"
    
    given:
      - "当前为第1天夜晚，日内进度接近每日总时长"
      
    when: "时间继续推进，日内进度超过每日总时长"
    
    then:
      domain_state: 
        - "游戏时钟将天数增加至第2天"
        - "日内进度扣除每日总时长，余数折算到新的一天"
        - "时段判定器将时段重置为'白天'"
        - "时间事件总线广播'跨天'和'白天开始'事件"
      presentation: 
        - "UI日期显示从'第1天'变为'第2天'"
        - "环境光照过渡回清晨/白天效果"

  - scenario_id: "TIME-003"
    name: "游戏暂停时的时间冻结"
    type: "edge-case"
    intent: "验证暂停指令能彻底冻结时间流逝，阻止一切基于时间推进的逻辑"
    
    given:
      - "游戏正常运行，小人正在移动或读条"
      
    when: "玩家触发暂停指令"
    
    then:
      domain_state: 
        - "游戏时钟状态更新为'已暂停'"
        - "时间换算器输出的游戏时间增量为0"
        - "依赖时间推进的需求衰减、工作读条、移动进度全部停止更新"
      presentation: 
        - "UI时钟停止走动"
        - "所有小人的动作和进度条冻结在当前帧"

  - scenario_id: "TIME-004"
    name: "极端帧间隔下的时间上限保护"
    type: "edge-case"
    intent: "验证当系统卡顿导致单帧现实时间增量过大时，游戏时间不会发生破坏性跳跃"
    
    given:
      - "游戏正常运行"
      
    when: "操作系统卡顿或后台挂起导致单帧传入了巨大的现实时间增量（如5秒）"
    
    then:
      domain_state: 
        - "时间换算器触发上限保护机制，将该帧的游戏时间增量截断在安全阈值内"
        - "避免小人瞬间饿死或瞬间完成长耗时工作"
      presentation: 
        - "游戏恢复流畅后，时间只推进了一小段安全距离，而不是瞬间跳跃数小时"
