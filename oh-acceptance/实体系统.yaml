system_name: "实体系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/实体系统.yaml"
code_design_ref: "oh-code-design/实体系统.yaml"

scenarios:
  - scenario_id: "ENTITY-001"
    name: "物资实体的状态流转与归属变化"
    type: "happy-path"
    intent: "验证物资在被拾取、携带和放置过程中，其位置和归属关系正确更新"
    given:
      - "地图上有一个处于 '散落状态' 的木头物资实体"
      - "小人执行搬运工作，到达物资所在格"
    when: "小人拾取该物资，随后将其放置到存储区"
    then:
      domain_state:
        - "拾取时：物资实体的位置属性清空，'所在容器类型' 变为小人，'当前占用者' 指向该小人，状态变为 '携带状态'"
        - "放置时：物资实体的 '当前占用者' 清空，'所在容器类型' 变为存储区，位置更新为存储区坐标，状态变为 '存储状态'"
      presentation:
        - "拾取时：物资模型从地图上消失（或显示在小人手中）"
        - "放置时：物资模型出现在存储区的对应格子上"

  - scenario_id: "ENTITY-002"
    name: "树木生命周期转化"
    type: "integration"
    intent: "验证树木实体在伐木完成后正确销毁并派生出新的物资实体"
    given:
      - "存在一个 '树木' 实体，状态为 '伐木中'"
    when: "伐木工作进度完成，触发实体生命周期规则"
    then:
      domain_state:
        - "实体目录中彻底删除该 '树木' 实体"
        - "在相同坐标位置，实体原型定义生成一个新的 '木头' 物资实体"
        - "新木头实体的状态初始化为 '散落状态'"
      presentation:
        - "树木模型播放倒塌动画后消失"
        - "木头物资模型在原地渲染出现"

  - scenario_id: "ENTITY-003"
    name: "床铺归属关系的唯一性约束"
    type: "edge-case"
    intent: "验证实体关系一致性规则能防止多名小人归属于同一张床，或一名小人拥有多张床"
    given:
      - "小人 A 已经拥有一张 '木床' 实体（归属关系已建立）"
      - "地图上新建成了第二张 '木床'"
    when: "归属规则器尝试为新木床分配所有者"
    then:
      domain_state:
        - "关系一致性规则校验小人 A 的 '床铺归属' 字段不为空"
        - "系统跳过小人 A，寻找其他无床小人进行分配"
        - "新木床的 '所有者' 绝对不会被指派给小人 A"
      presentation:
        - "UI 查看新木床详情时，所有者显示为其他小人或 '无'"

  - scenario_id: "ENTITY-004"
    name: "蓝图实体的创建与属性初始化"
    type: "happy-path"
    intent: "验证蓝图实体被正确创建并包含必要的工作追踪字段"
    given:
      - "玩家通过交互系统提交了建造墙体的命令"
    when: "应用编排层请求创建蓝图实体"
    then:
      domain_state:
        - "实体目录中新增一个 '建筑蓝图实体'"
        - "其 '蓝图类型' 为墙体，'建造进度' 初始为 0"
        - "其 '建造状态' 为 '等待建造'"
      presentation:
        - "地图上渲染出对应坐标的蓝图虚影模型"

  - scenario_id: "ENTITY-005"
    name: "岩石生命周期转化"
    type: "integration"
    intent: "验证岩石实体在开采完成后正确销毁并派生出石头物资实体"
    given:
      - "存在一个 '岩石' 实体，状态为 '开采中'"
    when: "开采工作进度完成，触发实体生命周期规则"
    then:
      domain_state:
        - "实体目录中彻底删除该 '岩石' 实体"
        - "在相同坐标位置，实体原型定义生成一个新的 '石头' 物资实体"
        - "新石头实体的状态初始化为 '散落状态'"
      presentation:
        - "岩石模型播放碎裂动画后消失"
        - "石头物资模型在原地渲染出现"
