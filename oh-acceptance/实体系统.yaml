system_name: "实体系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/实体系统.yaml"
code_design_ref: "oh-code-design/实体系统.yaml"

scenarios:
  - scenario_id: "ENTITY-001"
    name: "树木被伐木完成转为木头物资"
    type: "happy-path"
    intent: "验证实体生命周期转换：树木实体在伐木完成后被销毁并生成新的木头物资实体"
    
    given:
      - "地图上存在一棵树木实体，处于'伐木中'状态"
      - "小人正在该树木旁执行伐木工作"
      
    when: "小人的伐木工作读条结束，触发伐木完成事件"
    
    then:
      domain_state: 
        - "生命周期规则将该树木实体从实体目录中移除"
        - "在原坐标位置创建了一个新的'木头'物资实体"
        - "新物资实体的状态为'散落状态'，未被标记可拾取"
      presentation: 
        - "树木模型从地图上消失"
        - "原位置出现木头模型"

  - scenario_id: "ENTITY-002"
    name: "物资被拾取、携带与放下"
    type: "happy-path"
    intent: "验证物资实体在散落、携带、存储状态之间的转换及关系一致性"
    
    given:
      - "地图上存在一个'散落状态'的物资实体"
      - "小人到达该物资位置并执行拾取动作"
      
    when: "小人完成拾取，并随后将其搬运到存储区放下"
    
    then:
      domain_state: 
        - "拾取时：物资位置从地图格移除，关系一致性规则将其绑定到小人的'携带物'属性，状态变为'携带状态'"
        - "放下时：解除携带关系，物资位置更新为存储区坐标，绑定到存储区引用，状态变为'存储状态'"
      presentation: 
        - "拾取时：物资模型从地上消失，附加到小人模型或UI背包中"
        - "放下时：物资模型出现在存储区地块上"

  - scenario_id: "ENTITY-003"
    name: "蓝图建造完成转为建筑实体"
    type: "happy-path"
    intent: "验证建筑蓝图实体在进度达到100%后转化为真实的建筑实体"
    
    given:
      - "地图上存在一个木墙的建筑蓝图实体"
      - "小人正在执行建造工作，进度接近100%"
      
    when: "建造进度达到100%，触发蓝图完成事件"
    
    then:
      domain_state: 
        - "生命周期规则移除该蓝图实体"
        - "在相同覆盖格集合上创建一个'木墙'建筑实体"
        - "更新占用管理器的阻挡状态（如墙体阻挡通行）"
      presentation: 
        - "半透明的蓝图虚影消失"
        - "替换为真实的木墙模型"

  - scenario_id: "ENTITY-004"
    name: "实体归属关系的一致性保护"
    type: "edge-case"
    intent: "验证一个物资不能同时被两个小人携带，或同时处于散落和存储状态"
    
    given:
      - "一个物资实体正处于'携带状态'，归属于小人A"
      
    when: "系统异常或其他逻辑尝试将该物资分配给小人B或直接存入存储区"
    
    then:
      domain_state: 
        - "关系一致性规则拦截非法的状态变更请求"
        - "物资依然保持在小人A的携带物引用中"
        - "实体目录中的状态不发生破坏性改变"
      presentation: 
        - "视觉表现维持现状，不出现物资分身或瞬间移动"
