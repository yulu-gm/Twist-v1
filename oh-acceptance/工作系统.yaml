system_name: "工作系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/工作系统.yaml"
code_design_ref: "oh-code-design/工作系统.yaml"

scenarios:
  - scenario_id: "WORK-001"
    name: "物资标记触发拾取工作"
    type: "happy-path"
    intent: "验证玩家标记物资后，系统能自动生成拾取工作并被小人执行"
    given:
      - "地图上存在散落的物资"
      - "有一名处于 '空闲' 状态的小人"
    when: "玩家将该物资标记为 '可拾取'"
    then:
      domain_state:
        - "工作生成器创建一项 '拾取物资' 工作，目标为该物资实体"
        - "空闲小人从工作队列中领取该工作，工作状态变为 '执行中'"
        - "小人移动到物资处并执行拾取，物资状态变为 '携带状态'"
      presentation:
        - "物资上显示可拾取标记图标"
        - "小人移动到物资处播放拾取动画，物资从地图上消失（被携带）"

  - scenario_id: "WORK-002"
    name: "伐木工作链路执行"
    type: "integration"
    intent: "验证伐木工作完成后能正确生成木头，并派生出后续的拾取与搬运工作"
    given:
      - "地图上有一棵树木被标记为 '已标记伐木'"
      - "小人领取了该伐木工作并到达树木旁"
      - "地图上存在可用的存储区"
    when: "小人执行伐木读条达到 100%"
    then:
      domain_state:
        - "树木实体被销毁，原位置生成 '木头' 物资实体"
        - "伐木工作结算为 '已完成'"
        - "工作编排器自动为该木头生成 '拾取物资' 和 '搬运物资到存储区' 的后续工作"
      presentation:
        - "树木模型消失，替换为木头物资模型"
        - "小人无缝衔接拾取木头并向存储区移动"

  - scenario_id: "WORK-003"
    name: "工作目标消失导致工作失败"
    type: "edge-case"
    intent: "验证当小人前往执行工作的途中目标实体被销毁或状态改变时，工作能安全失败并释放小人"
    given:
      - "小人领取了一项 '拾取物资' 工作，正在 '移动' 途中"
    when: "目标物资被其他机制销毁（或被其他小人抢先拾取导致状态不再是散落）"
    then:
      domain_state:
        - "工作结算器检测到目标实体失效"
        - "当前工作状态更新为 '失败'"
        - "小人中止当前移动，主状态回退为 '空闲'，重新请求工作分配"
      presentation:
        - "小人停止前往原目标位置"
        - "小人头顶可能出现短暂的 '目标丢失' 提示符，随后寻找新目标"

  - scenario_id: "WORK-004"
    name: "高优先级工作抢占"
    type: "happy-path"
    intent: "验证工作队列能根据优先级正确分配任务给空闲小人"
    given:
      - "小人处于 '空闲' 状态"
      - "工作队列中同时存在 '搬运物资'（低优先级）和 '建造'（高优先级）工作"
    when: "小人向工作领取器请求分配工作"
    then:
      domain_state:
        - "工作编排器根据优先级规则对候选工作排序"
        - "小人成功锁定并领取 '建造' 工作"
        - "'搬运物资' 工作继续保持 '待执行' 状态"
      presentation:
        - "小人径直走向建筑蓝图开始施工，忽略旁边的待搬运物资"

  - scenario_id: "WORK-005"
    name: "开采工作链路执行"
    type: "integration"
    intent: "验证开采工作完成后能正确生成石头，并派生出后续的拾取与搬运工作"
    given:
      - "地图上有一块岩石被标记为 '已标记开采'"
      - "小人领取了该开采工作并到达岩石旁"
      - "地图上存在可用的存储区"
    when: "小人执行开采读条达到 100%"
    then:
      domain_state:
        - "岩石实体被销毁，原位置生成 '石头' 物资实体"
        - "开采工作结算为 '已完成'"
        - "工作编排器自动为该石头生成 '拾取物资' 和 '搬运物资到存储区' 的后续工作"
      presentation:
        - "岩石模型消失，替换为石头物资模型"
        - "小人无缝衔接拾取石头并向存储区移动"
