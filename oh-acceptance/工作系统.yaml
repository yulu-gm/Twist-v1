system_name: "工作系统"
story_ref: "oh-story/story-1.md"
gen_doc_ref: "oh-gen-doc/工作系统.yaml"
code_design_ref: "oh-code-design/工作系统.yaml"

scenarios:
  - scenario_id: "WORK-001"
    name: "伐木工作的生成与完整链路执行"
    type: "happy-path"
    intent: "验证标记树木后能正确生成伐木工作，并在完成后派生拾取与搬运工作"
    
    given:
      - "地图上存在未标记的树木"
      - "存在空闲小人"
      
    when: "玩家使用伐木工具框选并标记该树木"
    
    then:
      domain_state: 
        - "工作生成器创建'伐木'工作单，目标锁定该树木"
        - "小人领取工作并完成读条后，树木实体被销毁，生成木头物资实体"
        - "工作编排器自动派生出针对该木头物资的'拾取'和'搬运'工作"
      presentation: 
        - "树木上出现伐木标记UI"
        - "小人前往树木旁显示伐木读条"
        - "读条结束后树木模型消失，原地出现木头模型"

  - scenario_id: "WORK-002"
    name: "散落物资的自动拾取与搬运"
    type: "happy-path"
    intent: "验证框选物资标记为可拾取后，小人能将其收集到存储区"
    
    given:
      - "地图上散落着物资"
      - "玩家已建立了一个有效的存储区"
      
    when: "玩家框选物资并标记为'可拾取'"
    
    then:
      domain_state: 
        - "工作生成器为这些物资创建'拾取'工作"
        - "小人执行拾取后，物资状态变为'携带中'"
        - "工作编排器生成'搬运到存储区'工作"
        - "小人到达存储区后，物资状态变为'存储状态'"
      presentation: 
        - "物资被拾取后从地上消失，显示在小人手中或背包UI中"
        - "小人移动到存储区后，物资模型出现在存储区地块上"

  - scenario_id: "WORK-003"
    name: "工作目标在执行前消失"
    type: "edge-case"
    intent: "验证当小人前往执行工作的途中，目标实体被销毁或状态改变时的处理"
    
    given:
      - "小人已领取了一个'拾取物资'工作，正在前往物资所在地的途中"
      
    when: "该物资因其他原因（如被其他系统销毁或状态重置）突然消失"
    
    then:
      domain_state: 
        - "工作结算器检测到目标实体失效"
        - "该工作单状态被标记为'失败'或'取消'"
        - "小人释放该工作的锁定，行为状态机重新评估下一步行动（如退回空闲）"
      presentation: 
        - "小人中途停止移动，可能显示一个疑惑的表情气泡"
        - "UI任务队列中该任务被移除"

  - scenario_id: "WORK-004"
    name: "多个小人争抢同一工作目标的互斥锁定"
    type: "edge-case"
    intent: "验证同一个工作目标不会被多个小人重复领取和执行"
    
    given:
      - "地图上只生成了一个建造蓝图工作"
      - "同时存在多个空闲小人"
      
    when: "工作系统向所有空闲小人广播候选工作"
    
    then:
      domain_state: 
        - "第一个响应的小人通过工作领取器成功锁定该工作"
        - "工作占用记录中登记了该小人与蓝图的绑定关系"
        - "其他小人在尝试领取时被拒绝，继续寻找其他工作或保持空闲"
      presentation: 
        - "只有一个小人前往蓝图进行建造"
        - "其他小人无视该蓝图，继续散步或执行其他任务"
