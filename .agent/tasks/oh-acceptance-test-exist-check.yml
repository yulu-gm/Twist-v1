task_name: "按 oh-acceptance 模块检查测试存在性并输出模块报告"
created_at: "2026-04-06"
status: "completed"

# 约定：
# 1. 模块 id 采用 `oh-acceptance/<模块名>.yaml` 的文件名，例如 `行为系统`、`建筑系统`。
# 2. 用户输入中的 `working--plan/test-exist-check/` 按仓库现有目录结构解释为
#    `working-plan/test-exist-check/`。
# 3. 只有满足客观证据时，才允许把某个验收场景标记为“已有测试”：
#    - 无头测试：存在自动化测试文件，并且测试通过 `runScenarioHeadless(...)`
#      或 `createHeadlessSim(...)` 直接模拟业务场景，且能追溯到对应场景定义或等价场景搭建。
#    - 玩家可验收测试：存在 `scenarios/*.scenario.ts`，包含
#      `manualAcceptance.steps` 与 `manualAcceptance.outcomes`，且该场景已注册到
#      `scenarios/index.ts`，可经 `src/player/scenario-loader.ts` / HUD 在玩家侧加载。
# 4. 若某条测试与某个 `scenario_id` 之间无法建立唯一、客观的映射，必须输出
#    `status: "needs-manual-judgement"`，并附证据，不得主观认定“差不多覆盖了”。

tasks:
  - id: "T-00"
    title: "建立测试存在性检查契约与结果 YAML 模板"
    status: "completed"
    dependencies: []
    context:
      read_files:
        - "package.json"
        - "src/headless/scenario-types.ts"
        - "scenarios/index.ts"
        - "src/player/scenario-loader.ts"
        - "src/ui/hud-manager.ts"
        - "index.html"
      reference_docs:
        - "working-plan/headless-sim.yml"
        - "oh-acceptance/行为系统.yaml"
    action: |
      1. 创建目录 `working-plan/test-exist-check/`。
      2. 约定所有模块结果文件统一输出到 `working-plan/test-exist-check/{模块名}.yaml`。
      3. 结果 YAML 至少包含以下字段：
         - `module_id`, `module_name`, `source_acceptance_file`
         - `audit_rules.headless_required`
         - `audit_rules.player_acceptance_required`
         - `scenarios[]`
         - `summary`
      4. 在 `scenarios[]` 的每条记录中，至少写出：
         - `scenario_id`, `scenario_name`, `intent`
         - `headless.status`, `headless.evidence`
         - `player_acceptance.status`, `player_acceptance.evidence`
         - `notes`
      5. 只有当测试文件里存在 `runScenarioHeadless(` 或 `createHeadlessSim(`，且能对齐到某个验收场景的业务目标时，才允许把 `headless.status` 记为 `exists`。
      6. 只有当场景文件存在 `manualAcceptance.steps` 与 `manualAcceptance.outcomes`，且场景已加入 `ALL_SCENARIOS`，才允许把 `player_acceptance.status` 记为 `exists`。
      7. 若只能找到相近测试，但无法证明与某个 `scenario_id` 一一对应，则必须写成 `needs-manual-judgement`，并记录命中的文件路径与原因。
    acceptance_criteria: |
      - [ ] Grep: 本任务树中明确出现 `runScenarioHeadless`、`createHeadlessSim`、`manualAcceptance`、`ALL_SCENARIOS` 作为检查证据。
      - [ ] Grep: 本任务树中明确规定输出路径为 `working-plan/test-exist-check/{模块名}.yaml`。
      - [ ] Read: 后续 9 个模块任务都以统一 schema 产出结果 YAML，而不是自由格式文本。

