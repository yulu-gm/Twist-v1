# ──────────────────────────────────────────────────────────────────
# Story-1 完整验收 — 从当前代码到可玩第一天的全部任务
# ──────────────────────────────────────────────────────────────────
# 事实来源：oh-story/story-1.md + oh-acceptance/*.yaml
# 核心缺口：WorldCore 实体模型不足（缺 tree/resource/zone），
#   命令层不生成真实工单，行为系统与工单系统断开，UI 缺层级菜单与进度条。
#
# 无头测试范式：
#   scenario 定义   → scenarios/<name>.scenario.ts（导出 ScenarioDefinition）
#   vitest 包装     → tests/headless/<name>.test.ts（调用 runScenarioHeadless / createHeadlessSim）
#   场景注册        → scenarios/index.ts（加入 ALL_SCENARIOS 供浏览器面板枚举）
#   断言 helpers    → src/headless/scenario-helpers.ts（谓词工厂、assertXxx）
#   事件类型        → src/headless/sim-event-log.ts（SimEventKind 差分事件）
# ──────────────────────────────────────────────────────────────────

