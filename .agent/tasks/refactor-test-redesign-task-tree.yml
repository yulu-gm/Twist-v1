        - "working-plan/test-exist-check/UI系统.yaml"
    action: |
      1. 创建目录 `working-plan/refactor-test/`，并新增契约文件 `working-plan/refactor-test/refactor-test-design.schema.yml`。
      2. 在契约中定义所有模块设计稿必须统一包含的字段，至少包括：
         - `module_id`、`module_name`、`source_acceptance_file`、`source_audit_file`
         - `design_scope`
         - `refactor_objectives`
         - `global_constraints`
         - `scenario_redesign[]`
         - `test_architecture`
         - `out_of_scope`
         - `deliverable_checklist`
      3. 在 `scenario_redesign[]` 的每条记录中，明确要求包含：
         - `scenario_id`、`current_status_summary`
         - `current_mismatch`
         - `user_acceptance_flow.steps`
         - `user_acceptance_flow.expected_goal`
         - `user_acceptance_flow.visible_feedback`
         - `e2e_test_strategy.user_actions`
         - `e2e_test_strategy.assertions`
         - `e2e_test_strategy.forbidden_shortcuts`
         - `migration_notes`
      4. 在契约中明确以下全局约束：
         - 这次工作只设计测试，不实现测试、不改测试代码。
         - 无头测试必须只模拟用户操作与场景推进，不得以 domain 直调替代真实业务路径。
         - 每个场景都必须补齐“操作顺序、预期目标、可见反馈”三类信息。
         - 需要区分“已有可复用测试”、“需要废弃的 domain/局部无头测试”、“需要新增的端到端测试设计”。
    acceptance_criteria: |
      - [ ] Read: `working-plan/refactor-test/refactor-test-design.schema.yml` 存在，且包含 `scenario_redesign`、`user_acceptance_flow`、`e2e_test_strategy`、`forbidden_shortcuts`、`out_of_scope` 字段。
      - [ ] Grep: 契约文件中必须明确出现 `仅设计，不实现测试` 与 `无头测试必须只模拟用户操作` 两条约束。
      - [ ] Grep: 契约文件中必须明确要求输出路径为 `working-plan/refactor-test/{模块名}.yaml`。

