<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twist_V1</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111;
      }

      body {
        overflow: hidden;
        color: #f5f1e8;
        font-family: "Segoe UI", sans-serif;
      }

      #scene-hud {
        position: fixed;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: #f5f1e8;
        pointer-events: auto;
      }

      #scene-hud label {
        opacity: 0.85;
        letter-spacing: 0.02em;
      }

      #scene-variant {
        min-width: 200px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
        cursor: pointer;
      }

      #scene-variant:focus {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      #grid-hover-info {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        max-width: min(320px, calc(100vw - 24px));
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.92);
        color: #f5f1e8;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-line;
        pointer-events: none;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }

      #grid-hover-info[hidden] {
        display: none !important;
      }

      #villager-tool-bar {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        z-index: 11;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        pointer-events: auto;
        max-width: calc(100vw - 24px);
        flex-wrap: wrap;
        justify-content: center;
      }

      #villager-tool-bar .tool-slot {
        min-width: 64px;
        padding: 6px 8px 8px;
        border-radius: 8px;
        border: 1px solid #3d3830;
        background: #242019;
        color: #f5f1e8;
        cursor: pointer;
        text-align: center;
        font-size: 12px;
        line-height: 1.2;
        transition:
          border-color 0.12s ease,
          background 0.12s ease,
          box-shadow 0.12s ease;
      }

      #villager-tool-bar .tool-slot:hover {
        border-color: #6e6558;
        background: #2a241c;
      }

      #villager-tool-bar .tool-slot:focus-visible {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      #villager-tool-bar .tool-slot.selected {
        border-color: #e8c547;
        box-shadow: 0 0 0 1px rgba(232, 197, 71, 0.45);
        background: #2f281c;
      }

      #villager-tool-bar .tool-key {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: #c4b8a4;
        margin-bottom: 4px;
      }

      #villager-tool-bar .tool-label {
        font-size: 13px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="scene-hud" aria-label="测试场景切换">
      <label for="scene-variant">测试场景</label>
      <select id="scene-variant" title="切换原型测试场景">
        <option value="default">默认（原显示名）</option>
        <option value="alt-en">随机英文名 ×5</option>
      </select>
    </div>
    <div id="grid-hover-info" hidden aria-live="polite"></div>
    <div id="villager-tool-bar" role="toolbar" aria-label="小人指令工具"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
