<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twist_V1</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111;
      }

      body {
        overflow: hidden;
        color: #f5f1e8;
        font-family: "Segoe UI", sans-serif;
      }

      #scene-hud {
        position: fixed;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        color: #f5f1e8;
        pointer-events: auto;
      }

      #scene-hud label {
        opacity: 0.85;
        letter-spacing: 0.02em;
      }

      #scene-variant {
        min-width: 200px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
        cursor: pointer;
      }

      #scene-variant:focus {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="scene-hud" aria-label="测试场景切换">
      <label for="scene-variant">测试场景</label>
      <select id="scene-variant" title="切换原型测试场景">
        <option value="default">默认（原显示名）</option>
        <option value="alt-en">随机英文名 ×5</option>
      </select>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
