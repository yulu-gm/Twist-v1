<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twist_V1</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #111;
      }

      body {
        overflow: hidden;
        color: #f5f1e8;
        font-family: "Segoe UI", sans-serif;
      }

      /* 左上角：场景栏 + 其下方纵向展开的运行时调试面板 */
      #top-left-hud-stack {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 10;
        display: inline-flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        max-width: min(720px, calc(100vw - 24px));
        pointer-events: none;
      }

      #top-left-hud-stack > #scene-hud,
      #top-left-hud-stack > #scene-debug-panel {
        pointer-events: auto;
      }

      #scene-hud {
        position: relative;
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        gap: 16px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        font-size: 13px;
        color: #f5f1e8;
        flex-shrink: 0;
      }

      #scene-hud label,
      #scene-hud .scene-hud-label {
        opacity: 0.85;
        letter-spacing: 0.02em;
      }

      .scene-hud-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #scene-time {
        min-width: 108px;
      }

      #scene-time-controls {
        min-width: 220px;
      }

      #scene-time-value {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      #scene-speed-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .scene-time-button {
        min-width: 54px;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
        cursor: pointer;
        transition:
          border-color 0.12s ease,
          background 0.12s ease,
          box-shadow 0.12s ease;
      }

      .scene-time-button:hover {
        border-color: #6e6558;
        background: #2a241c;
      }

      .scene-time-button:focus-visible {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      .scene-time-button.selected {
        border-color: #e8c547;
        box-shadow: 0 0 0 1px rgba(232, 197, 71, 0.45);
        background: #2f281c;
      }

      /* 暂停态：与倍速「选中」区分（倍速互斥；暂停为独立开关） */
      .scene-time-button.time-paused {
        border-style: dashed;
        border-color: #887b6a;
        background: #1a1814;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .scene-time-button.time-paused:hover {
        border-color: #9a8c78;
        background: #201d18;
      }

      #scene-variant {
        min-width: 200px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
        cursor: pointer;
      }

      #scene-variant:focus {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      #right-dev-stack {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 12;
        width: min(340px, calc(100vw - 24px));
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
        pointer-events: none;
      }

      #right-dev-stack > aside {
        pointer-events: auto;
      }

      #yaml-scenario-panel {
        max-height: min(58vh, 520px);
        overflow: auto;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        color: #f5f1e8;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      }

      #yaml-scenario-panel label {
        display: block;
        font-size: 11px;
        opacity: 0.88;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }

      #yaml-scenario-select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
        cursor: pointer;
        margin-bottom: 8px;
      }

      #yaml-scenario-select:focus {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      #yaml-scenario-hint {
        margin: 0 0 8px;
        font-size: 11px;
        color: #b8a88c;
      }

      #yaml-scenario-desc {
        margin: 0 0 8px;
        font-size: 11px;
        color: #d4c4a8;
      }

      #yaml-scenario-manual {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #4a4238;
      }

      .yaml-manual-block {
        margin-bottom: 10px;
      }

      .yaml-manual-title {
        display: block;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: #e8c547;
        margin-bottom: 4px;
      }

      #yaml-scenario-manual-steps,
      #yaml-scenario-manual-outcomes {
        margin: 0;
        padding-left: 1.15em;
        font-size: 11px;
        color: #eadfcb;
      }

      #yaml-scenario-manual-steps li,
      #yaml-scenario-manual-outcomes li {
        margin-bottom: 5px;
      }

      #grid-hover-info {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 10;
        max-width: min(320px, calc(100vw - 24px));
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.92);
        color: #f5f1e8;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-line;
        pointer-events: none;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }

      #grid-hover-info[hidden] {
        display: none !important;
      }

      #scene-debug-panel[hidden] {
        display: none !important;
      }

      /* 玩家通道（网关反馈）：隐藏显示，DOM 保留供逻辑绑定 */
      #player-channel-hint {
        display: none !important;
      }

      #player-channel-hint .player-channel-mode {
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      #player-channel-hint .player-channel-result {
        margin-top: 0;
        font-size: 11px;
        color: #d4c4a8;
      }

      #player-channel-hint .player-channel-contract {
        margin-top: 0;
        font-size: 10px;
        color: #a89878;
        word-break: break-word;
      }

      #scene-debug-panel {
        position: relative;
        flex-shrink: 0;
        box-sizing: border-box;
        width: 100%;
        max-height: min(58vh, 520px);
        overflow: auto;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        color: #f5f1e8;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
      }

      #scene-debug-panel > .scene-hud-group {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      #scene-debug-panel label {
        display: block;
        font-size: 11px;
        opacity: 0.88;
        letter-spacing: 0.04em;
      }

      #scene-debug-panel input#scene-debug-filter {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #5c5346;
        background: #242019;
        color: #f5f1e8;
        font: inherit;
      }

      #scene-debug-panel input#scene-debug-filter:focus {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      .scene-debug-actions {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
      }

      .scene-debug-actions .scene-time-button {
        width: 100%;
      }

      #scene-debug-ndjson-path {
        font-size: 11px;
        line-height: 1.35;
        color: #a89f8f;
        word-break: break-all;
        margin: 4px 0 0;
      }

      #scene-debug-log-list {
        flex: 1 1 auto;
        min-height: 72px;
        max-height: 180px;
        overflow-y: auto;
        border-radius: 6px;
        border: 1px solid #3d3830;
        background: rgba(18, 16, 14, 0.65);
      }

      #scene-debug-detail {
        flex-shrink: 0;
        max-height: 120px;
        overflow: auto;
        margin: 0;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #3d3830;
        background: rgba(18, 16, 14, 0.85);
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      #villager-tool-bar {
        position: fixed;
        inset: 0;
        z-index: 11;
        pointer-events: none;
      }

      #villager-tool-bar button {
        font: inherit;
      }

      #villager-command-primary {
        position: fixed;
        left: 12px;
        bottom: 16px;
        z-index: 11;
        min-width: 168px;
        min-height: 84px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #5c5346;
        background: linear-gradient(180deg, rgba(45, 39, 30, 0.98), rgba(28, 24, 20, 0.98));
        color: #f5f1e8;
        cursor: pointer;
        text-align: left;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 6px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        pointer-events: auto;
      }

      #villager-command-primary:hover,
      #villager-command-primary:focus-visible {
        border-color: #8b7e68;
        outline: none;
      }

      #villager-command-primary .command-primary-prefix {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #c4b8a4;
      }

      #villager-command-primary .command-primary-label {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      #villager-command-primary .command-primary-meta {
        font-size: 11px;
        color: #d4c4a8;
      }

      #villager-command-categories {
        position: fixed;
        left: 12px;
        bottom: 112px;
        z-index: 11;
        width: 110px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: auto;
      }

      #villager-command-list {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        z-index: 11;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
        gap: 8px;
        width: min(calc(9 * 88px + 8 * 8px), calc(100vw - 220px));
        pointer-events: auto;
      }

      .command-subgroup-heading {
        flex-basis: 100%;
        width: 100%;
        margin: 4px 0 0;
        padding: 0 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #a89b82;
        text-transform: none;
      }

      .command-category-button,
      .command-item-button {
        min-height: 56px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #3d3830;
        background: #242019;
        color: #f5f1e8;
        cursor: pointer;
        transition:
          border-color 0.12s ease,
          background 0.12s ease,
          box-shadow 0.12s ease,
          transform 0.12s ease;
      }

      .command-category-button:hover,
      .command-item-button:hover,
      .command-category-button:focus-visible,
      .command-item-button:focus-visible {
        border-color: #6e6558;
        background: #2a241c;
        outline: none;
      }

      .command-category-button.selected,
      .command-item-button.selected {
        border-color: #e8c547;
        box-shadow: 0 0 0 1px rgba(232, 197, 71, 0.45);
        background: #2f281c;
      }

      .command-category-button {
        text-align: left;
        font-size: 12px;
        line-height: 1.2;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .command-item-button {
        min-width: 88px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 4px;
        text-align: left;
        line-height: 1.2;
      }

      .command-item-hotkey {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #c4b8a4;
      }

      .command-item-label {
        font-size: 13px;
        font-weight: 600;
      }

      #pawn-roster {
        position: fixed;
        left: 50%;
        top: 12px;
        transform: translateX(-50%);
        z-index: 11;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: stretch;
        gap: 8px;
        padding: 8px 10px;
        max-width: min(720px, calc(100vw - 320px));
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        pointer-events: auto;
      }

      #pawn-roster .pawn-roster-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        min-width: 56px;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #3d3830;
        background: #242019;
        color: #f5f1e8;
        cursor: pointer;
        font: inherit;
        transition:
          border-color 0.12s ease,
          background 0.12s ease,
          box-shadow 0.12s ease;
      }

      #pawn-roster .pawn-roster-item:hover {
        border-color: #6e6558;
        background: #2a241c;
      }

      #pawn-roster .pawn-roster-item:focus-visible {
        outline: 2px solid #81b29a;
        outline-offset: 2px;
      }

      #pawn-roster .pawn-roster-item.selected {
        border-color: #e8c547;
        box-shadow: 0 0 0 1px rgba(232, 197, 71, 0.45);
        background: #2f281c;
      }

      #pawn-roster .pawn-roster-thumb {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid #1a1a1a;
        box-sizing: border-box;
        flex-shrink: 0;
      }

      #pawn-roster .pawn-roster-name {
        font-size: 11px;
        font-weight: 500;
        text-align: center;
        line-height: 1.15;
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* 右上角锚定：避免原垂直居中与右下角 #right-dev-stack（场景验收面板）纵向重叠 */
      #pawn-detail-panel {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 10;
        width: min(300px, calc(100vw - 24px));
        max-height: calc(100vh - 24px - min(46vh, 400px));
        overflow-y: auto;
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid #5c5346;
        background: rgba(28, 24, 20, 0.94);
        color: #f5f1e8;
        font-size: 13px;
        line-height: 1.45;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
        pointer-events: none;
      }

      #pawn-detail-panel[hidden] {
        display: none !important;
      }

      #pawn-detail-panel h2 {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      #pawn-detail-panel .pawn-detail-epithet {
        margin: 0 0 12px;
        font-size: 12px;
        color: #d4c4a8;
      }

      #pawn-detail-panel .pawn-detail-section {
        margin-top: 10px;
      }

      #pawn-detail-panel .pawn-detail-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #a89878;
        margin-bottom: 4px;
      }

      #pawn-detail-panel .pawn-detail-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      #pawn-detail-panel .pawn-detail-tag {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid #5c5346;
        font-size: 11px;
        color: #eadfcb;
      }

    </style>
  </head>
  <body>
    <div id="top-left-hud-stack" aria-label="场景菜单与运行时调试">
      <div id="scene-hud" aria-label="场景菜单栏">
        <div class="scene-hud-group">
          <label for="scene-variant">测试场景</label>
          <select id="scene-variant" title="仅切换显示名组合（与右下角验收独立）">
            <option value="default">默认（原显示名）</option>
            <option value="alt-en">随机英文名 ×5</option>
          </select>
        </div>
        <div id="scene-time" class="scene-hud-group" aria-live="polite">
          <span class="scene-hud-label">时间</span>
          <span id="scene-time-value">Day 1 06:00</span>
        </div>
        <div id="scene-time-controls" class="scene-hud-group">
          <span class="scene-hud-label">时间控制</span>
          <div id="scene-speed-controls">
            <button id="scene-time-toggle" class="scene-time-button" type="button" title="空格：暂停/继续；` 键（主键盘 1 左侧）：暂停">
              暂停
            </button>
            <button id="scene-speed-1" class="scene-time-button selected" type="button" title="主键盘 1：1 倍速">
              1x
            </button>
            <button id="scene-speed-2" class="scene-time-button" type="button" title="主键盘 2：2 倍速">
              2x
            </button>
            <button id="scene-speed-3" class="scene-time-button" type="button" title="主键盘 3：3 倍速">
              3x
            </button>
          </div>
        </div>
        <div class="scene-hud-group">
          <span class="scene-hud-label">运行时日志</span>
          <button id="scene-debug-toggle" class="scene-time-button" type="button">调试面板</button>
        </div>
      </div>
      <aside id="scene-debug-panel" aria-label="运行时调试日志" hidden>
        <div class="scene-hud-group">
          <span class="scene-hud-label">运行时调试日志</span>
          <div class="scene-debug-actions">
            <button id="scene-debug-pause" class="scene-time-button" type="button">暂停滚动</button>
            <button id="scene-debug-clear" class="scene-time-button" type="button">清空</button>
          </div>
        </div>
        <label for="scene-debug-filter">过滤</label>
        <input id="scene-debug-filter" type="text" placeholder="关键词" />
        <div id="scene-debug-count" aria-live="polite"></div>
        <div id="scene-debug-ndjson-path" aria-live="polite" hidden></div>
        <div id="scene-debug-log-list" aria-live="polite"></div>
        <pre id="scene-debug-detail"></pre>
      </aside>
    </div>
    <div id="right-dev-stack" aria-label="测试场景面板">
      <aside id="yaml-scenario-panel" aria-label="测试场景（热切换，不重启场景）">
        <label for="yaml-scenario-select">测试场景（scenarios/*.scenario.ts）</label>
        <select
          id="yaml-scenario-select"
          title="将 ScenarioDefinition 写入当前 WorldCore 与小人状态；不执行 expectations 自动判定"
        ></select>
        <p id="yaml-scenario-hint">
          载入后可直接游玩观察；与 Vitest 中 `runScenarioHeadless` 共用同一份场景数据。
        </p>
        <p id="yaml-scenario-desc" hidden></p>
        <div id="yaml-scenario-manual" hidden>
          <div class="yaml-manual-block">
            <strong class="yaml-manual-title">操作流程</strong>
            <ol id="yaml-scenario-manual-steps"></ol>
          </div>
          <div class="yaml-manual-block">
            <strong class="yaml-manual-title">期望结果</strong>
            <ol id="yaml-scenario-manual-outcomes"></ol>
          </div>
        </div>
      </aside>
    </div>
    <div id="player-channel-hint" aria-live="polite" hidden>
      <div id="player-channel-mode" class="player-channel-mode"></div>
      <div id="player-channel-result" class="player-channel-result"></div>
      <div id="player-channel-contract" class="player-channel-contract"></div>
    </div>
    <div id="grid-hover-info" hidden aria-live="polite"></div>
    <div id="villager-tool-bar" role="toolbar" aria-label="三层命令菜单"></div>
    <div id="pawn-roster" role="tablist" aria-label="人物略缩图"></div>
    <aside id="pawn-detail-panel" hidden aria-live="polite"></aside>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
