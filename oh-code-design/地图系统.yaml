子系统: 地图系统
需求覆盖:
  覆盖结论: 覆盖地图格、位置、区域、选区结果承接与初始内容分布需求
  来源文档:
    - 地图系统
    - 交互系统
    - 实体系统
目标:
  - 提供统一的空间坐标、格子关系、占用与区域表达
  - 作为交互输入、行为移动、实体放置的共享空间基础
  - 让区域创建与地图展示基于同一空间模型
分层:
  空间模型层:
    职责:
      - 定义地图尺寸、格坐标、邻接关系、覆盖格集合
      - 定义可通行、被占用、被选中等空间状态
  空间规则层:
    职责:
      - 处理通行、占用冲突、区域覆盖合法性判断
      - 提供矩形选区与路径相关基础查询
  空间索引层:
    职责:
      - 按坐标索引实体、区域、蓝图、建筑
      - 支持高频读取
  空间投影层:
    职责:
      - 为 UI 和交互反馈输出地块高亮、边界、可用性提示
模块:
  地图网格:
    职责:
      - 维护所有地图格的基础属性
      - 提供坐标合法性与邻接查询
  占用管理器:
    职责:
      - 记录每个格上的实体占用、建筑阻挡、临时保留
      - 为移动与建造提供冲突判断
  区域管理器:
    职责:
      - 创建与维护存储区
      - 维护区域覆盖格与区域显示边界
  选区解析器:
    职责:
      - 把玩家拖拽框选转换为格坐标集合
      - 过滤超界格与不可用格
核心数据:
  - 名称: 地图格
    关键字段:
      - 坐标
      - 可通行状态
      - 占用对象集合
      - 临时高亮状态
  - 名称: 覆盖格集合
    关键字段:
      - 格坐标列表
      - 边界范围
      - 连通性信息
  - 名称: 存储区
    关键字段:
      - 区域标识
      - 名称
      - 覆盖格集合
      - 当前存储物资集合
  - 名称: 初始地图快照
    关键字段:
      - 初始小人位置
      - 初始物资分布
      - 初始树木分布
      - 初始岩石分布
关键流程:
  - 名称: 创建存储区
    步骤:
      - 交互系统提交框选格集合
      - 选区解析器校验格集合合法性
      - 区域管理器创建存储区对象
      - 地图投影更新区域边界显示
  - 名称: 建筑放置判定
    步骤:
      - 建筑系统请求检查目标格集合
      - 占用管理器校验是否与阻挡对象冲突
      - 返回可放置、不可放置或部分可放置结果
  - 名称: 移动查询
    步骤:
      - 行为系统请求当前位置邻接格
      - 地图网格与占用管理器联合返回可达候选
接口边界:
  输入:
    - 来自交互系统的框选与点击结果
    - 来自实体系统的实体创建、删除、移动事件
    - 来自建筑系统的蓝图覆盖格申请
  输出:
    - 提供给行为系统的可达与邻接查询
    - 提供给交互系统的选区命中结果
    - 提供给 UI 系统的高亮、边界、地图显示数据
扩展点:
  - 区域系统可扩展优先级、过滤规则与多种区域类型
  - 地图格可增加地形成本、室内外标签、光照等属性
  - 可从矩形选区扩展到刷子、套索等其他选择方式
风险:
  - 若实体位置与地图占用索引分开更新，容易出现鬼影占用
  - 多格建筑与多格区域若缺少统一覆盖格语义，边界会难以维护
待确认问题:
  - 存储区是否允许非连续格集合；需求允许连续或非连续，需要明确创建约束
  - 蓝图阶段是否占用地图格通行
