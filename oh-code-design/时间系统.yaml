子系统: 时间系统
需求覆盖:
  覆盖结论: 覆盖昼夜切换、实时推进、工作耗时、移动耗时与需求衰减的时间基础
  来源文档:
    - 时间系统
    - 工作系统
    - 行为系统
    - 需求系统
目标:
  - 提供统一、可暂停、可调速的游戏时间基准
  - 让移动、读条、需求变化与昼夜切换共享同一时间语义
  - 为 UI 提供稳定的时间显示与时段事件
分层:
  时间模型层:
    职责:
      - 定义游戏日、时段、时间片、调速档位等结构
      - 定义游戏时间与现实时间的换算规则
  时间推进层:
    职责:
      - 接收现实时间流逝并转换为游戏时间增量
      - 处理暂停、恢复、调速与跨日归一化
  时间事件层:
    职责:
      - 产生白天开始、夜晚开始、跨天等事件
      - 为需求、行为、工作系统广播时间边界变化
  时间投影层:
    职责:
      - 输出面向 UI 的日期、时段、进度等只读信息
模块:
  游戏时钟:
    职责:
      - 维护当前游戏日、日内进度、是否暂停与当前速度档
  时间换算器:
    职责:
      - 将现实时间增量转换为游戏时间增量
      - 对极端帧间隔做上限保护，避免时间跳跃过大
  时段判定器:
    职责:
      - 根据日内进度计算当前属于白天还是夜晚
      - 识别时段切换点
  时间事件总线:
    职责:
      - 对外发布跨天、时段切换、时间片推进事件
核心数据:
  - 名称: 时间快照
    关键字段:
      - 第几天
      - 日内进度
      - 当前时段
      - 是否暂停
      - 速度档位
  - 名称: 时间配置
    关键字段:
      - 每日总时长
      - 白天阈值
      - 夜晚阈值
      - 现实时间与游戏时间比率
  - 名称: 时间事件
    关键字段:
      - 事件类型
      - 发生时刻
      - 相关日计数
关键流程:
  - 名称: 日常推进
    步骤:
      - 游戏时钟接收现实时间增量
      - 时间换算器产出游戏时间增量
      - 游戏时钟更新日内进度
      - 时段判定器识别是否需要触发时段切换
      - 向外广播时间片与时段事件
  - 名称: 跨天归一化
    步骤:
      - 日内进度超过每日总时长
      - 增加天数
      - 将多余时间折算到下一天
      - 重新计算当前时段
  - 名称: 暂停与调速
    步骤:
      - 接收暂停或速度变更指令
      - 更新游戏时钟状态
      - 后续时间换算按新配置执行
接口边界:
  输入:
    - 来自主循环的现实时间流逝
    - 来自 UI 或控制逻辑的暂停与速度变更请求
  输出:
    - 提供给工作系统的读条与移动耗时基准
    - 提供给需求系统的时间推进输入
    - 提供给行为系统的昼夜切换事件
    - 提供给 UI 系统的时间展示数据
扩展点:
  - 可扩展天气、季节等更大时间尺度
  - 可扩展不同工作在不同速度档位下的表现策略
  - 可扩展脚本事件在特定时刻触发
风险:
  - 若各系统自行累计耗时，容易出现时间语义分裂
  - 暂停时若仍允许部分子系统推进，会造成状态不同步
待确认问题:
  - 白天与夜晚是否只有两个时段，还是后续要支持更多阶段
  - 游戏速度可调节是否影响动画与表现节奏，还是只影响领域时间
