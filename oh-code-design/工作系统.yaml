子系统: 工作系统
需求覆盖:
  覆盖结论: 覆盖拾取、搬运、伐木、建造四类工作及其队列、状态与自动检测逻辑
  来源文档:
    - 工作系统
    - 行为系统
    - 实体系统
    - 建筑系统
目标:
  - 将玩家标记或世界变化转化为可分配、可追踪、可恢复的工作单元
  - 为行为系统提供统一的工作候选与执行上下文
  - 保证工作状态与实体变化之间的因果关系清晰
分层:
  工作模型层:
    职责:
      - 定义工作类型、工作状态、目标对象、执行要求
      - 把复杂任务拆成可执行步骤
  工作生成层:
    职责:
      - 根据地图标记、蓝图生成、物资状态变化自动创建工作
      - 去重并合并重复工作
  工作调度层:
    职责:
      - 为小人提供候选工作列表
      - 管理领取、锁定、取消、失败重试
  工作结算层:
    职责:
      - 根据行为执行结果更新工作状态
      - 触发后续派生工作
模块:
  工作目录:
    职责:
      - 保存所有待执行、执行中、完成、失败工作
      - 支持按类型、优先级、位置查询
  工作生成器:
    职责:
      - 从可拾取物资、伐木标记、蓝图等世界信号生成工作
      - 建立工作与目标实体的双向关联
  工作编排器:
    职责:
      - 表达复合工作步骤，例如伐木后自动衔接拾取与搬运
      - 在必要时拆出后续工作而不是把整条链路塞进单一步骤
  工作领取器:
    职责:
      - 对空闲小人暴露可领取工作
      - 锁定目标，避免多个小人重复抢占
  工作结算器:
    职责:
      - 根据执行结果完成、失败或重开工作
      - 处理目标消失、目标被占用等异常
核心数据:
  - 名称: 工作单
    关键字段:
      - 工作标识
      - 工作类型
      - 工作状态
      - 目标实体标识
      - 目标位置
      - 发起原因
      - 优先级
  - 名称: 工作步骤
    关键字段:
      - 步骤类型
      - 执行前置条件
      - 成功结果
      - 失败结果
  - 名称: 工作占用记录
    关键字段:
      - 工作标识
      - 小人标识
      - 锁定目标
      - 锁定时间
关键流程:
  - 名称: 自动生成拾取工作
    步骤:
      - 物资被标记为可拾取
      - 工作生成器创建拾取工作
      - 若存在可用存储区，则同时登记后续搬运意图
  - 名称: 伐木链路
    步骤:
      - 树木被标记为伐木
      - 生成伐木工作并锁定树木目标
      - 伐木完成后触发木头生成
      - 生成拾取工作与搬运工作
  - 名称: 建造链路
    步骤:
      - 玩家生成蓝图
      - 工作生成器创建建造工作
      - 建造完成后更新蓝图与建筑实体状态
接口边界:
  输入:
    - 来自交互系统的标记结果
    - 来自建筑系统的蓝图创建结果
    - 来自实体系统的目标状态变化
    - 来自行为系统的执行成功或失败回报
  输出:
    - 提供给行为系统的候选工作列表
    - 提供给 UI 系统的工作状态与进度来源
    - 提供给实体系统的工作完成结果
扩展点:
  - 工作类型可通过声明式步骤模板扩展
  - 支持在后续加入更复杂的前置条件，例如材料、技能、区域限制
  - 支持工作优先级规则替换，而不影响工作生成
风险:
  - 若把整条工作链硬编码为单一工作状态机，会抬高扩展成本
  - 若工作锁定与实体占用规则不统一，容易产生重复执行
待确认问题:
  - 建造是否需要消耗材料；当前需求仅明确有进度与建成结果
  - 搬运工作是独立工作，还是作为拾取与伐木的自动后续动作
