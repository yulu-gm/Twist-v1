子系统: 需求系统
需求覆盖:
  覆盖结论: 覆盖当前饱食度与精力值需求，并保留未来扩展更多需求类型的空间
  来源文档:
    - 需求系统
    - 时间系统
    - 行为系统
    - 实体系统
目标:
  - 以统一规则管理小人的内在需求变化与满足结果
  - 为行为系统提供可排序、可解释的需求压力输入
  - 将需求变化与时间推进、进食、睡眠结果解耦
分层:
  需求模型层:
    职责:
      - 定义需求类型、当前值、阈值、恢复规则
      - 约束需求状态与实体状态的映射关系
  需求计算层:
    职责:
      - 根据时间、活动、休息、进食计算需求变化
      - 输出需求压力、紧急程度与建议行动类型
  需求协调层:
    职责:
      - 接收行为系统查询
      - 处理满足需求行为的开始、持续与完成
  需求投影层:
    职责:
      - 为 UI 和调试工具输出可读状态，例如饥饿、疲劳、恢复中
模块:
  需求档案:
    职责:
      - 保存每个小人的需求快照
      - 支持批量更新与单体查询
  阈值规则集:
    职责:
      - 定义正常、警戒、紧急等需求区间
      - 将数值转译为决策优先级
  需求演化引擎:
    职责:
      - 响应时间推进
      - 根据行为上下文计算下降或恢复量
  需求满足结算器:
    职责:
      - 结算进食与睡眠带来的恢复
      - 处理被中断后的部分恢复效果
核心数据:
  - 名称: 需求快照
    关键字段:
      - 小人标识
      - 饱食度当前值
      - 精力值当前值
      - 饥饿阶段
      - 疲劳阶段
  - 名称: 需求规则配置
    关键字段:
      - 下降速率
      - 恢复速率
      - 警戒阈值
      - 紧急阈值
  - 名称: 需求行动建议
    关键字段:
      - 行动类型
      - 目标对象类型
      - 紧急程度
      - 是否允许打断当前工作
关键流程:
  - 名称: 时间驱动需求下降
    步骤:
      - 时间系统推进时间片
      - 需求演化引擎按小人当前行为结算需求变化
      - 阈值规则集重新计算需求阶段
      - 行为系统读取最新需求压力
  - 名称: 进食恢复
    步骤:
      - 行为系统确认小人进入进食行为
      - 需求满足结算器持续恢复饱食度
      - 达到完成条件后关闭进食意图
  - 名称: 睡眠恢复
    步骤:
      - 行为系统确认小人进入休息行为
      - 需求满足结算器持续恢复精力值
      - 满足恢复条件或到达唤醒条件后结束休息
接口边界:
  输入:
    - 来自时间系统的时间推进
    - 来自行为系统的当前行为上下文
    - 来自实体系统的食物、床铺与归属关系
  输出:
    - 提供给行为系统的需求优先级与目标建议
    - 提供给 UI 系统的需求展示字段
    - 提供给工作系统的可打断信号
扩展点:
  - 可新增更多需求类型，例如情绪、安全感、社交
  - 不同需求可采用不同的下降与恢复曲线
  - 可支持物品、环境、建筑对需求恢复速度的修正
风险:
  - 需求阈值若只靠固定数值，后续很难表达角色差异
  - 需求系统若直接挑选具体目标，会与行为系统职责重叠
待确认问题:
  - 进食是否必须消耗一个完整包装食品实体
  - 夜晚是否必然与疲劳阈值同步，还是时间与疲劳分别判断
