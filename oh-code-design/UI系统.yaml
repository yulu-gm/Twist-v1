子系统: UI系统
需求覆盖:
  覆盖结论: 覆盖主菜单、工具栏、地图信息展示、状态反馈、进度条与第一天核心操作反馈
  来源文档:
    - UI系统
    - 交互系统
    - 行为系统
    - 时间系统
目标:
  - 为玩家提供清晰的功能入口、模式提示与状态反馈
  - 让地图内反馈与菜单操作保持一致的可理解性
  - 以读模型驱动展示，避免 UI 直接承担领域规则
分层:
  界面结构层:
    职责:
      - 定义左下角主菜单、底部工具栏、地图叠加层、状态展示区
      - 管理各区域的显示与隐藏
  界面状态层:
    职责:
      - 保存主菜单的展开路径、当前激活的工具栏分类、当前选中工具、当前模式提示
      - 订阅领域系统只读数据并转成界面态
  界面呈现层:
    职责:
      - 渲染按钮、图标、边框、进度条、状态标签
      - 控制过渡与高亮反馈
  界面动作转发层:
    职责:
      - 将点击主菜单、选择工具等操作转发给交互系统
模块:
  主菜单模型:
    职责:
      - 管理一级（指令大类）、二级（指令子类）的层级展开状态
      - 选中二级菜单项时，通知工具栏模型更新当前激活的分类
  工具栏模型:
    职责:
      - 根据主菜单激活的分类，动态展示对应的三级具体工具选项
      - 管理开采、伐木、建造等具体工具入口与选中状态
      - 定义工具项与对应交互模式的映射关系
  地图叠加反馈层:
    职责:
      - 展示选区框、蓝图虚影、存储区边界、标记图标、进度条
  状态展示模型:
    职责:
      - 展示小人当前行为、需求提示、时间信息
      - 聚合多个系统的只读字段
核心数据:
  - 名称: 主菜单状态
    关键字段:
      - 展开层级路径 (一级/二级)
      - 当前激活的工具栏分类
  - 名称: 工具栏状态
    关键字段:
      - 当前选中工具 (三级叶子节点)
      - 当前模式提示
      - 当前悬停信息
      - 对应交互模式
  - 名称: 地图反馈项
    关键字段:
      - 反馈类型
      - 位置或覆盖格
      - 显示样式
      - 生命周期
关键流程:
  - 名称: 主菜单与工具栏联动进入操作模式
    步骤:
      - 玩家点击左下角主菜单一级入口展开二级菜单
      - 玩家选择二级菜单项，底部工具栏展示对应的三级具体工具
      - 玩家在底部工具栏点击三级具体工具
      - UI 更新当前选中状态
      - 动作转发层通知交互系统切换模式
      - 状态区展示当前模式提示
  - 名称: 地图反馈更新
    步骤:
      - 交互系统或领域系统更新只读状态
      - 地图叠加反馈层刷新选区、高亮、虚影、标记、进度条
  - 名称: 小人行为展示
    步骤:
      - 行为系统输出当前行为标签
      - 状态展示模型转为图标或文本
      - 在小人附近或信息区显示
接口边界:
  输入:
    - 来自交互系统的当前模式与预览数据
    - 来自行为系统的行为标签与进度
    - 来自时间系统的日期与时段信息
    - 来自地图系统与实体系统的可视对象状态
  输出:
    - 向交互系统提交工具选择
    - 向玩家呈现模式提示、地图反馈与状态信息
扩展点:
  - 主菜单与工具栏可改为数据驱动配置
  - 状态展示可扩展实体详情面板、筛选视图、教程提示
  - 地图反馈层可扩展更多可视化，如范围预览、优先级颜色编码
风险:
  - 若 UI 直接决定领域可行性，会造成反馈与真实规则不一致
  - 若地图叠加反馈缺少统一层级，选区、蓝图、进度条可能互相遮挡
待确认问题:
  - 小人状态展示更偏向地图上方轻量提示，还是单独信息面板
  - 缩放与平移尚未明确，后续可能影响 UI 锚点与反馈布局
