子系统: 行为系统
需求覆盖:
  覆盖结论: 覆盖小人状态机、需求打断、空闲散步、工作执行与昼夜驱动行为切换
  来源文档:
    - 行为系统
    - 需求系统
    - 工作系统
    - 时间系统
    - 实体系统
目标:
  - 负责小人的自主决策与行为状态转换
  - 在需求、工作与时间之间做优先级协调
  - 保持行为选择可解释、可重放、可测试
分层:
  决策输入层:
    职责:
      - 汇总需求压力、候选工作、可达目标、时间事件
      - 生成同一决策周期内可比较的候选行动
  行为决策层:
    职责:
      - 依据优先级规则选择行动
      - 决定是否打断当前行为
  行为状态机层:
    职责:
      - 管理空闲、移动、执行工作、满足需求等状态
      - 维护进入条件、退出条件、中断条件
  行为执行协调层:
    职责:
      - 将已选行动拆为移动、读条、结算等执行阶段
      - 向工作、需求、实体系统发送结果
模块:
  行为上下文汇总器:
    职责:
      - 读取小人自身状态、需求状态、工作候选、地图信息
      - 形成单一决策输入快照
  行动评分器:
    职责:
      - 给需求行动、工作行动、散步行动排序
      - 综合紧急度、距离、当前携带状态、时间语境
  行为状态机:
    职责:
      - 维护状态转换与子状态细节
      - 表达移动中、伐木中、建造中、进食中、休息中等状态
  行为执行器:
    职责:
      - 驱动当前行为推进
      - 在阶段完成时产生领域结果
核心数据:
  - 名称: 行为快照
    关键字段:
      - 小人标识
      - 当前主状态
      - 当前子状态
      - 当前目标
      - 是否可被打断
  - 名称: 行动候选
    关键字段:
      - 行动类型
      - 目标对象
      - 分数
      - 原因
      - 前置条件
  - 名称: 行为转换规则
    关键字段:
      - 来源状态
      - 目标状态
      - 触发条件
      - 中断优先级
关键流程:
  - 名称: 空闲转工作
    步骤:
      - 行为上下文汇总器生成候选行动
      - 行动评分器选出最高优先级工作
      - 状态机进入移动状态并锁定目标
  - 名称: 工作被需求打断
    步骤:
      - 需求系统发出紧急需求信号
      - 行动评分器比较当前行为与需求行动
      - 若需求更高则中断当前工作
      - 状态机切换为前往食物或床铺
  - 名称: 夜晚休息
    步骤:
      - 时间系统发出夜晚事件
      - 行为系统重新评估疲劳与床铺可用性
      - 小人前往自己的床并进入休息状态
接口边界:
  输入:
    - 来自需求系统的需求优先级
    - 来自工作系统的候选工作与锁定结果
    - 来自时间系统的时段事件
    - 来自地图系统的可达位置与邻接关系
  输出:
    - 向工作系统回报工作执行结果
    - 向需求系统声明进食与休息开始或结束
    - 向 UI 系统输出当前行为标签与进度来源
扩展点:
  - 行动评分规则可替换，以支持性格差异或职业分工
  - 状态机可增加社交、巡逻、逃离危险等新状态
  - 可引入计划缓存，减少每个决策周期的重复计算
风险:
  - 若行为系统同时承担路径、规则计算、动画驱动，职责会过重
  - 需求打断若缺少冷却机制，角色可能频繁抖动切换状态
待确认问题:
  - 空闲散步是完全随机，还是应限制在最近可行走区域
  - 工作执行中哪些阶段允许被需求打断，哪些阶段必须原子完成
