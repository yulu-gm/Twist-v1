子系统: 交互系统
需求覆盖:
  覆盖结论: 覆盖菜单选择、选区工具、蓝图笔刷、家具放置与模式切换反馈
  来源文档:
    - 交互系统
    - UI系统
    - 地图系统
    - 建筑系统
目标:
  - 管理玩家输入到领域意图之间的转换
  - 用显式交互模式保证不同工具的输入含义清晰
  - 让选区、笔刷、点击放置都具备统一反馈与撤销边界
分层:
  输入采集层:
    职责:
      - 接收鼠标按下、拖拽、释放、点击等原始输入
      - 抽象出连续输入会话
  交互模式层:
    职责:
      - 管理当前模式，例如存储区创建、开采标记、伐木标记、拾取标记、蓝图绘制、家具放置
      - 定义不同模式的输入解释规则
  交互意图层:
    职责:
      - 把输入结果转为领域命令
      - 在提交前执行基础校验与过滤
  反馈协调层:
    职责:
      - 维护选区框、虚影、高亮、提示文案等交互反馈状态
模块:
  模式注册表:
    职责:
      - 定义每个交互模式的进入条件、退出条件、输入规则
  选区会话管理器:
    职责:
      - 管理拖拽开始、更新、结束
      - 输出矩形框与命中格集合
  笔刷会话管理器:
    职责:
      - 管理连续拖拽路径
      - 输出路径覆盖格与去重结果
  交互命令生成器:
    职责:
      - 将模式结果转成创建区域、标记岩石、标记树木、标记物资、创建蓝图等领域命令
  反馈状态仓:
    职责:
      - 保存当前模式提示、预览结果、高亮集合
核心数据:
  - 名称: 交互模式
    关键字段:
      - 模式类型
      - 进入来源
      - 当前提示
      - 是否允许拖拽
      - 是否允许单点确认
  - 名称: 输入会话
    关键字段:
      - 起始位置
      - 当前指针位置
      - 命中格集合
      - 是否已确认
  - 名称: 交互命令
    关键字段:
      - 命令类型
      - 目标格集合
      - 目标实体集合
      - 来源模式
关键流程:
  - 名称: 存储区创建模式
    步骤:
      - 玩家从菜单进入存储区创建模式
      - 选区会话管理器返回框选格集合
      - 交互命令生成器产出创建存储区命令
      - 提交地图系统执行
  - 名称: 开采标记模式
    步骤:
      - 玩家选择开采工具
      - 选区会话输出命中格与岩石目标
      - 交互命令生成器产出岩石标记命令
      - 提交实体系统与工作系统后续处理
  - 名称: 伐木标记模式
    步骤:
      - 玩家选择伐木工具
      - 选区会话输出命中格与树木目标
      - 交互命令生成器产出树木标记命令
      - 提交实体系统与工作系统后续处理
  - 名称: 墙体蓝图绘制模式
    步骤:
      - 玩家选择墙体建造
      - 笔刷会话管理器收集拖拽路径
      - 反馈层展示虚影
      - 释放后生成蓝图创建命令
接口边界:
  输入:
    - 来自 UI 系统的菜单选择结果
    - 来自地图系统的格坐标命中与对象命中信息
  输出:
    - 向地图系统提交选区创建请求
    - 向实体系统提交标记请求
    - 向建筑系统提交蓝图放置请求
    - 向 UI 系统提供当前模式与提示文本
扩展点:
  - 新工具可通过新增模式注册接入，而不污染现有输入处理
  - 可扩展批量取消、重做、预览成本等高级交互能力
  - 可扩展键盘快捷切换模式
风险:
  - 若输入采集与模式逻辑耦合过深，后续新增工具会频繁改动同一区域
  - 若交互模式没有显式退出规则，容易残留错误状态
待确认问题:
  - 家具放置是否只允许在房间内；需求有倾向但未定义房间判定方式
  - 取消当前模式的操作方式与反馈是否需要单独设计
