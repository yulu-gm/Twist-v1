子系统: 实体系统
需求覆盖:
  覆盖结论: 完整覆盖当前实体需求，并为工作、需求、建筑、地图提供统一领域对象边界
  来源文档:
    - 实体系统
    - 地图系统
    - 建筑系统
    - 需求系统
    - 行为系统
目标:
  - 定义游戏世界中的核心对象、身份、生命周期与关系约束
  - 让行为、工作、地图、建筑与 UI 基于统一实体视图协作
  - 保证对象状态可序列化、可追踪、可做纯规则计算
分层:
  领域模型层:
    职责:
      - 定义实体类别、实体标识、状态结构与关系约束
      - 约束生命周期转换，例如树木转木头、蓝图转建筑实体
      - 提供与实现无关的实体快照结构
  领域规则层:
    职责:
      - 校验实体状态变化是否合法
      - 计算实体衍生状态与可交互能力
      - 维护实体之间的一致性约束
  应用编排层:
    职责:
      - 接收工作、需求、时间、交互系统发来的状态变更请求
      - 协调多实体联动更新
  读取投影层:
    职责:
      - 为 UI、交互反馈、调试视图提供只读投影
模块:
  实体目录:
    职责:
      - 按实体标识集中管理所有实体
      - 提供按类型、位置、关系的查询入口
    依赖:
      - 实体原型定义
  实体原型定义:
    职责:
      - 定义小人、物资、树木、岩石、蓝图、建筑实体、区域对象的固定字段
      - 定义各类型默认值与必填约束
  生命周期规则:
    职责:
      - 管理创建、删除、转化、占用、归属变化
      - 处理树木消失生成木头、岩石消失生成石头、蓝图完成生成建筑实体
  关系一致性规则:
    职责:
      - 维护小人与床铺、物资与存储区、小人与携带物等关系
      - 防止一份资源同时处于多个位置或归属状态
  实体查询投影:
    职责:
      - 为工作分配、需求决策、地图显示提供稳定查询结果
核心数据:
  - 名称: 实体标识
    说明: 全局唯一标识，用于在系统之间稳定引用实体
  - 名称: 小人实体
    关键字段:
      - 位置
      - 行为状态
      - 当前目标
      - 携带物标识
      - 饱食度
      - 精力值
      - 床铺归属
  - 名称: 物资实体
    关键字段:
      - 物资类型
      - 位置
      - 所在容器类型
      - 所在容器标识
      - 可拾取标记
      - 当前占用者
  - 名称: 树木实体
    关键字段:
      - 位置
      - 伐木标记
      - 是否被占用
  - 名称: 岩石实体
    关键字段:
      - 位置
      - 开采标记
      - 是否被占用
  - 名称: 建筑蓝图实体
    关键字段:
      - 蓝图类型
      - 覆盖格集合
      - 建造进度
      - 建造状态
      - 关联工作标识
  - 名称: 建筑实体
    关键字段:
      - 建筑类型
      - 覆盖格集合
      - 可交互能力
      - 归属信息
  - 名称: 区域实体
    关键字段:
      - 区域类型
      - 覆盖格集合
      - 名称
      - 接受物资类型规则
关键流程:
  - 名称: 岩石转石头
    步骤:
      - 开采工作完成
      - 生命周期规则删除岩石实体
      - 在原位置创建石头物资实体
      - 同步更新地图占用与工作结果
  - 名称: 树木转木头
    步骤:
      - 伐木工作完成
      - 生命周期规则删除树木实体
      - 在原位置创建木头物资实体
      - 同步更新地图占用与工作结果
  - 名称: 蓝图转建筑
    步骤:
      - 建造进度达到完成条件
      - 生命周期规则移除蓝图实体
      - 创建对应建筑实体
      - 触发建筑后续规则，例如床铺归属候选更新
  - 名称: 携带与放下
    步骤:
      - 小人拾取物资时建立携带关系
      - 物资位置从地图或区域转为小人容器
      - 放下时写回目标格或目标区域
接口边界:
  输入:
    - 来自交互系统的标记或创建请求
    - 来自工作系统的执行结果
    - 来自需求系统的进食或休息目标确认
    - 来自建筑系统的蓝图完成事件
  输出:
    - 提供给行为系统的可行动对象视图
    - 提供给地图系统的占用与显示对象清单
    - 提供给 UI 系统的状态快照
扩展点:
  - 新实体类型可通过声明能力标签接入工作、行为与 UI，而不是改写所有规则
  - 建筑与家具可共享同一套实体原型与可交互能力模型
  - 区域实体可扩展为更多区域用途，例如禁区、优先建造区
风险:
  - 若实体关系与地图占用分别维护，容易出现位置与归属不一致
  - 若蓝图、建筑、区域都直接保存完整格集合，需要统一冲突判定策略
待确认问题:
  - 存储区是否只允许一种区域类型，还是未来会扩展为多种区域
  - 建筑实体是否允许跨多格共享同一个实体标识，还是按格拆分并通过组合表达
