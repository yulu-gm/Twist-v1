子系统: 建筑系统
需求覆盖:
  覆盖结论: 覆盖墙体、木床、蓝图阶段、施工阶段、完成阶段与床铺自动分配机制
  来源文档:
    - 建筑系统
    - 工作系统
    - 实体系统
    - 交互系统
目标:
  - 把玩家的建造意图转换为蓝图、施工与建成结果
  - 统一管理建筑类型、放置规则、完成后效果与归属关系
  - 将建筑规划、工作执行、实体落地职责分清
分层:
  建筑定义层:
    职责:
      - 定义墙体、木床等建筑类型的规格与能力
      - 定义蓝图与成品之间的映射关系
  建筑规划层:
    职责:
      - 接收玩家放置意图
      - 校验覆盖格并创建蓝图
  建筑施工层:
    职责:
      - 管理建造进度
      - 与工作系统协同推进施工
  建筑结果层:
    职责:
      - 将完成的蓝图转化为建筑实体
      - 触发建成后的附加规则，例如床铺归属
模块:
  建筑规格目录:
    职责:
      - 维护每类建筑的尺寸、通行性、可交互能力、是否可归属
  蓝图管理器:
    职责:
      - 创建、更新、取消蓝图
      - 维护蓝图进度与状态
  建造校验器:
    职责:
      - 检查目标格是否允许放置
      - 处理连续墙体与单点家具的放置差异
  建成结算器:
    职责:
      - 在施工完成时生成建筑实体
      - 触发床铺分配等后续规则
  归属规则器:
    职责:
      - 管理木床与小人的自动分配关系
核心数据:
  - 名称: 建筑规格
    关键字段:
      - 建筑类型
      - 占用格模式
      - 是否阻挡通行
      - 可交互能力
      - 完成后附加规则
  - 名称: 蓝图记录
    关键字段:
      - 蓝图标识
      - 蓝图类型
      - 覆盖格集合
      - 当前进度
      - 当前状态
  - 名称: 床铺归属记录
    关键字段:
      - 床铺标识
      - 小人标识
      - 归属状态
关键流程:
  - 名称: 绘制墙体蓝图
    步骤:
      - 交互系统提交笔刷路径
      - 建造校验器筛选可放置格
      - 蓝图管理器批量创建墙体蓝图
      - 工作系统收到建造工作生成信号
  - 名称: 放置木床蓝图
    步骤:
      - 交互系统提交单点放置请求
      - 建造校验器校验位置
      - 创建木床蓝图并登记建造工作
  - 名称: 建成后床铺分配
    步骤:
      - 木床建造完成
      - 归属规则器筛选尚未拥有床铺的小人
      - 生成床铺归属结果
接口边界:
  输入:
    - 来自交互系统的绘制与放置请求
    - 来自地图系统的空间合法性结果
    - 来自工作系统的建造完成回报
  输出:
    - 向实体系统提交蓝图与建筑实体变更
    - 向工作系统提交建造工作生成请求
    - 向需求系统与行为系统提供床铺归属数据
扩展点:
  - 建筑规格可扩展材料、房间标签、功能半径等属性
  - 支持同一建筑类型拥有多种放置模式，例如刷线、矩形、单点
  - 床铺归属规则未来可替换为手动指派或优先级指派
风险:
  - 若蓝图与建筑实体混用同一状态结构，会让生命周期转换变得含糊
  - 若自动分配床铺不记录原因，后续玩家手动调整会难以兼容
待确认问题:
  - 蓝图是否阻挡通行目前未定，需要独立规则字段表达
  - 建造是否消耗材料目前未定，需保留可选材料校验接口
