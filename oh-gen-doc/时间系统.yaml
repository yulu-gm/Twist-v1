# 时间系统设计文档
# 维度：定义游戏时间结构和时间相关机制

时间结构:
  游戏日:
    描述: 游戏中的基本时间单位
    组成:
      白天:
        描述: 游戏开始时的时间段
        特点: 小人可以正常活动
      夜晚:
        描述: 待后续需求补充
    循环: 游戏日循环推进

时间推进:
  描述: 游戏时间如何流逝
  推进方式:
    实时推进:
      描述: 游戏时间随现实时间推进
      速度: 待配置（游戏时间/现实时间比率）
    影响因素:
      - 游戏暂停时时间停止
      - 游戏速度可调节（待后续需求）

游戏初始时间:
  描述: 游戏开始时的时间状态
  时间点: 第一天白天
  游戏日计数: 第1天
  时段: 白天

时间与行为的关联:
  描述: 时间如何影响游戏行为
  影响范围:
    读条时间:
      描述: 伐木等工作需要消耗游戏时间
      机制: 读条进度随游戏时间推进
    移动时间:
      描述: 小人移动消耗游戏时间
      机制: 移动进度随游戏时间推进
    小人状态变化:
      描述: 游戏开始时小人"醒来"
      触发时间: 第一天白天开始

时间相关配置:
  待配置项:
    - 一天包含多少游戏时间单位
    - 白天/夜晚的划分
    - 游戏时间与现实时间的比率
    - 游戏速度档位设置
