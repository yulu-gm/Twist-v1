# UI系统设计文档
# 维度：定义游戏界面元素、菜单结构和交互组件

菜单系统:
  主界面布局:
    左下角菜单:
      描述: 游戏主要的指令入口区域
      层级结构:
        一级入口:
          名称: 指令
          交互: 点击切换二级菜单的展开与收起
        二级菜单:
          名称: 指令类型
          位置: 展开后在一级入口上方
          选项列表:
            命令:
              描述: 让小人执行特定动作
              触发三级菜单: [开采, 伐木, 拾取]
            建造:
              描述: 选择建造建筑结构
              触发三级菜单: [墙体, 家具]
            区域:
              描述: 区域相关操作
              触发三级菜单: [存储区]
          交互: 点击后打开对应的三级菜单
        三级菜单:
          名称: 选项列表
          位置: 显示在屏幕下方居中位置的一个横排
          内容: 表示当前选中指令类型的可用具体选项
          具体选项详情:
            开采:
              描述: 进入开采标记模式
            伐木:
              描述: 进入伐木标记模式
            拾取:
              描述: 进入物资拾取标记模式
            墙体:
              描述: 进入墙体建造选择（如木墙）
            家具:
              描述: 进入家具建造选择（如木床）
            存储区:
              描述: 进入存储区操作选择（如新建）

工具栏/交互组件:
  开采工具:
    描述: 用于标记岩石为开采目标
    图标: 待设计
    功能:
      - 选择该工具后进入开采标记模式
      - 框选地图上的岩石
      - 被选中的岩石标记为"已标记开采"
    交互方式: 选区工具框选

  伐木工具:
    描述: 用于标记树木为伐木目标
    图标: 待设计
    功能:
      - 选择该工具后进入伐木标记模式
      - 框选地图上的树木
      - 被选中的树木标记为"已标记伐木"
    交互方式: 选区工具框选

  物资拾取标记工具:
    描述: 用于标记散落物资为可拾取
    图标: 待设计
    功能:
      - 选择该工具后进入拾取标记模式
      - 框选地图上的物资
      - 被选中的物资标记为"可拾取"
    交互方式: 选区工具框选

  选区工具UI:
    描述: 通用的框选交互组件
    视觉表现:
      选区框:
        描述: 玩家拖拽时显示的矩形选区
        样式:
          边框: 半透明边框线
          填充: 半透明填充色
      已选中元素:
        描述: 被框选的地图格/实体的视觉反馈
        样式:
          高亮显示
          边框强调

  蓝图笔刷:
    描述: 用于在地图上连续绘制建筑蓝图的工具
    视觉表现:
      虚影: 鼠标悬停或拖拽时，显示待建造建筑的半透明虚影

地图界面:
  描述: 主要游戏画面区域
  显示内容:
    - 地图格
    - 小人
    - 物资
    - 树木
    - 岩石
    - 存储区边界
    - 标记图标
    - 建筑蓝图虚影
    - 建筑实体
  缩放与平移:
    待后续需求补充

状态反馈:
  小人状态:
    描述: 显示小人当前行为
    显示方式:
      - 小人动画表现（如工作、进食、睡觉）
      - 状态图标（开采中、伐木中、搬运中、建造中等）
  进度条:
    描述: 显示工作进行进度
    应用场景:
      - 开采读条进度
      - 伐木读条进度
      - 建造读条进度
    显示位置: 目标实体上方

第一天UI交互流程:
  步骤一:
    操作: 点击左下角"指令" -> "区域" -> "存储区" -> "新建"
    反馈: 进入存储区创建模式，框选后显示存储区边界
  步骤二:
    操作: 点击左下角"指令" -> "建造" -> "墙体" -> "木墙"
    反馈: 进入蓝图笔刷模式，拖拽勾勒出房子蓝图虚影
  步骤三:
    操作: 点击左下角"指令" -> "建造" -> "家具" -> "木床"
    反馈: 进入家具放置模式，点击在房间内放置木床蓝图
