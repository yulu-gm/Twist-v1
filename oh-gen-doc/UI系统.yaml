# UI系统设计文档
# 维度：定义游戏界面元素、菜单结构和交互组件

菜单系统:
  主菜单结构:
    区域:
      描述: 与区域相关的操作菜单
      子菜单:
        存储区:
          操作列表:
            新建:
              描述: 创建新的存储区
              触发后: 进入存储区创建模式，使用选区工具框选地图格

工具栏:
  伐木工具:
    描述: 用于标记树木为伐木目标
    图标: 待设计
    功能:
      - 选择该工具后进入伐木标记模式
      - 框选地图上的树木
      - 被选中的树木标记为"已标记伐木"
    交互方式: 选区工具框选

  物资拾取标记工具:
    描述: 用于标记散落物资为可拾取
    图标: 待设计
    功能:
      - 选择该工具后进入拾取标记模式
      - 框选地图上的物资
      - 被选中的物资标记为"可拾取"
    交互方式: 选区工具框选

选区工具UI:
  描述: 通用的框选交互组件
  视觉表现:
    选区框:
      描述: 玩家拖拽时显示的矩形选区
      样式:
        边框: 半透明边框线
        填充: 半透明填充色
    已选中元素:
      描述: 被框选的地图格/实体的视觉反馈
      样式:
        高亮显示
        边框强调

地图界面:
  描述: 主要游戏画面区域
  显示内容:
    - 地图格
    - 小人
    - 物资
    - 树木
    - 存储区边界
    - 标记图标
  缩放与平移:
    待后续需求补充

状态反馈:
  小人状态:
    描述: 显示小人当前行为
    显示方式:
      - 小人动画表现
      - 状态图标（伐木中、搬运中等）
  进度条:
    描述: 显示工作进行进度
    应用场景:
      - 伐木读条进度
    显示位置: 目标实体上方

第一天UI交互流程:
  步骤一:
    操作: 点击"区域"菜单
    反馈: 展开子菜单
  步骤二:
    操作: 点击"存储区"子菜单
    反馈: 展开操作列表
  步骤三:
    操作: 点击"新建"
    反馈: 进入存储区创建模式
  步骤四:
    操作: 在地图上框选
    反馈: 显示选区范围
  步骤五:
    操作: 释放鼠标
    反馈: 存储区创建成功，显示存储区边界
