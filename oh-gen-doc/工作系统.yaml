# 工作系统设计文档
# 维度：定义工作任务类型、执行流程和优先级

工作类型:
  拾取物资:
    描述: 小人移动到散落的物资位置并将其拾取
    触发条件:
      - 地图上有物资被标记为"可拾取"
      - 小人处于空闲状态
    执行流程:
      步骤:
        - 小人检测到可拾取的物资
        - 小人移动到物资所在地图格
        - 小人执行拾取动作
        - 物资变为小人的携带物
    完成条件: 物资被小人拾取
    结果状态: 物资变为"携带状态"

  搬运物资到存储区:
    描述: 小人将携带的物资搬运到存储区
    触发条件:
      - 小人携带物资
      - 存在可用的存储区
    执行流程:
      步骤:
        - 小人检测到携带物资
        - 小人移动到存储区
        - 小人放下物资
    完成条件: 物资被放置在存储区内
    结果状态: 物资变为"存储状态"

  伐木:
    描述: 小人移动到被标记的树木旁，执行伐木工作
    触发条件:
      - 有树木被标记为"已标记伐木"
      - 小人处于空闲状态
    执行流程:
      步骤:
        - 小人检测到伐木工作
        - 小人移动到树木旁边的地图格
        - 小人开始读条（伐木进度）
        - 读条结束，树木消失
        - 在原位置生成木头物资
        - 小人拾取木头物资
        - 小人搬运物资到存储区
    读条机制:
      描述: 小人在树旁边读条一段时间
      属性:
        持续时间: 待定（需配置）
        进度显示: 显示伐木进度条
        可中断: 待定
    完成条件: 树木变为木头物资
    结果状态: 木头物资在存储区中

工作队列:
  描述: |
    管理所有待执行的工作。
    小人会自动从工作队列中获取工作并执行。
  属性:
    待执行工作列表:
      类型: 工作对象列表
      描述: 所有等待执行的工作
    工作优先级:
      类型: 排序规则
      描述: 决定小人执行工作的顺序
  工作分配:
    触发: 小人完成当前工作或变为空闲
    流程:
      - 检查工作队列
      - 选择优先级最高的工作
      - 分配给空闲的小人

工作状态:
  待执行:
    描述: 工作已创建但尚未被小人领取
  执行中:
    描述: 小人正在执行该工作
  已完成:
    描述: 工作已成功完成
  失败:
    描述: 工作执行失败（如目标消失）

自动工作检测:
  描述: |
    系统自动检测地图上可执行的工作。
    当有新工作产生时，通知空闲的小人。
  检测条件:
    物资拾取: 有物资被标记为"可拾取"
    伐木工作: 有树木被标记为"已标记伐木"
