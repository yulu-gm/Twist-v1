# ========================================
# 玩法设计维度
# ========================================
玩法设计:
  核心机制:
    游戏类型: 经典贪吃蛇
    玩家目标: 控制蛇移动，吃掉食物使蛇变长，尽可能获得高分
    基本规则:
      - 蛇持续向前移动，玩家控制方向
      - 吃到食物后蛇身增长一节，得分增加
      - 撞到墙壁或自身则游戏结束
    
  操作方式:
    输入设备: 键盘
    方向控制:
      上: 向上移动
      下: 向下移动
      左: 向左移动
      右: 向右移动
    操作约束: 
      - 不能直接反向移动（如向右时不能立即向左）
      - 方向输入响应需要即时

  游戏元素:
    蛇:
      组成: 头部 + 身体（若干节）
      初始状态:
        长度: 3 节（待确认）
        位置: 场地中央（待确认）
      行为特征:
        - 持续移动，速度恒定
        - 身体跟随头部移动轨迹
        - 增长时在尾部添加新节
    
    食物:
      外观: 待设计
      生成规则:
        - 随机出现在空白格子中
        - 被吃掉后立即生成新的
        - 不能出现在蛇身上
      效果: 蛇增长一节，得分增加
    
    游戏场地:
      大小: 待设计
      边界: 
        - 碰撞即死亡
        - 或可选择穿墙模式（待确认）

  胜负条件:
    游戏结束:
      - 撞墙死亡
      - 撞到自己死亡
    计分方式:
      - 每吃一个食物得一定分数
      - 分数累计显示

# ========================================
# 表现设计维度
# ========================================
表现设计:
  视觉风格:
    整体风格: 待设计（像素风 / 扁平化 / 卡通风格）
    配色方案: 待设计
    
  蛇的视觉表现:
    头部:
      外观: 与身体有明显区分
      朝向: 根据移动方向变化
    
    身体:
      外观: 连续的节段
      连接处理: 身体各节之间需要平滑过渡
    
    运动动画:
      核心需求: 蛇的运动要有连续的动画表现
      动画类型: 
        - 移动动画: 蛇身各节平滑移动而非跳跃式位移
        - 转向动画: 头部转向时的平滑过渡（待确认是否需要）
      实现要点:
        - 使用 Phaser 补间动画（Tween）实现平滑移动
        - 身体各节沿轨迹移动，形成流畅的蛇形运动
        - 避免网格跳跃式移动，采用像素级平滑过渡
    
  食物视觉表现:
    外观: 待设计
    动画: 可考虑添加轻微闪烁或浮动效果
    
  UI元素:
    分数显示:
      位置: 待设计（通常在顶部）
      样式: 待设计
    
    游戏状态:
      开始界面: 待设计
      暂停功能: 待确认
      游戏结束界面: 待设计
        - 显示最终得分
        - 重新开始按钮

# ========================================
# 系统设计维度
# ========================================
系统设计:
  技术架构:
    框架选择: Phaser 3
    选择理由:
      - 成熟的 HTML5 游戏框架
      - 内置物理引擎、动画系统
      - 良好的 TypeScript 支持
      - 适合 2D 休闲游戏开发
    
    目录结构建议:
      游戏逻辑层: src/game/
        用途: 游戏状态、实体类、逻辑处理
        建议模块:
          - Snake: 蛇实体类
          - Food: 食物实体类
          - GameWorld: 游戏世界状态管理
      
      表现层: src/scenes/
        用途: Phaser 场景、UI 渲染
        建议场景:
          - BootScene: 资源加载
          - GameScene: 主游戏场景
          - UIScene: UI 覆盖层
      
      数据配置: data/
        用途: JSON 配置文件
        建议内容:
          - 游戏参数配置
          - 关卡配置（如有）

  核心模块设计:
    蛇模块 (Snake):
      职责: 管理蛇的状态和行为
      属性:
        - body: 蛇身节数组
        - direction: 当前移动方向
        - speed: 移动速度
      方法:
        - move(): 执行移动
        - grow(): 增长
        - setDirection(): 设置方向
        - checkCollision(): 碰撞检测
    
    食物模块 (Food):
      职责: 管理食物生成和状态
      方法:
        - spawn(): 生成新食物
        - getPosition(): 获取当前位置
    
    游戏管理器 (GameManager):
      职责: 管理游戏整体状态
      状态:
        - score: 当前得分
        - isPlaying: 游戏是否进行中
      方法:
        - start(): 开始游戏
        - pause(): 暂停游戏
        - reset(): 重置游戏
        - gameOver(): 游戏结束处理

  动画系统设计:
    平滑移动实现方案:
      方案一: 基于网格的补间动画
        描述: 每次移动一格，使用 Tween 实现平滑过渡
        优点: 实现简单，逻辑清晰
        缺点: 可能不够流畅
      
      方案二: 连续像素移动
        描述: 蛇以像素为单位持续移动，身体跟随轨迹
        优点: 更加流畅自然
        缺点: 碰撞检测需要更精确
      
      推荐方案: 方案二，更符合"连续动画表现"的需求
    
    身体跟随算法:
      描述: 身体各节沿头部轨迹移动
      实现:
        - 记录头部移动轨迹点
        - 身体各节根据距离间隔分布在轨迹上
        - 每帧更新位置

  数据结构:
    方向枚举:
      UP: 上
      DOWN: 下
      LEFT: 左
      RIGHT: 右
    
    蛇身节数据:
      position: { x: number, y: number }
      angle: 角度（用于转向动画）
    
    游戏状态:
      snake: 蛇实例
      food: 食物实例
      score: 分数
      gridSize: 网格大小
      gameState: 'idle' | 'playing' | 'paused' | 'gameover'

