# 贪吃蛇游戏系统设计文档
# 基于用户需求自动生成，供开发参考

项目基本信息:
  项目名称: 贪吃蛇游戏
  技术栈:
    游戏框架: Phaser 3
    编程语言: TypeScript
    构建工具: Vite（根据 CLAUDE.md 推断）
  目标平台: Web 浏览器
  文档版本: 1.0
