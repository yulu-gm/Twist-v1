# 行为系统设计文档
# 维度：定义小人的行为逻辑、状态机和决策机制

小人状态机:
  描述: |
    小人的行为由状态机控制。
    小人会根据当前状态和外部条件自动切换状态。
  
  状态定义:
    空闲状态:
      描述: 小人没有正在执行的工作，且没有紧迫需求
      行为: 漫无目的散步
      进入条件:
        - 游戏初始生成
        - 完成工作后无新工作
        - 需求满足后无工作
      退出条件:
        - 检测到可执行的工作
        - 产生紧迫生理/心理需求
    移动状态:
      描述: 小人正在移动到目标位置
      行为: 沿路径移动
      进入条件: 确定了移动目标（工作目标、食物、床铺等）
      退出条件:
        - 到达目标位置
        - 目标失效
    执行工作状态:
      描述: 小人正在执行某项工作
      子状态:
        伐木中:
          描述: 小人在树旁读条伐木
          行为: 显示伐木动画和进度条
        建造中:
          描述: 小人在蓝图旁读条建造
          行为: 显示建造动画和进度条
        拾取中:
          描述: 小人正在拾取物资
          行为: 拾取动画
        放置中:
          描述: 小人正在放置物资
          行为: 放置动画
      进入条件: 到达工作目标位置
      退出条件: 工作完成或被高优先级需求打断
    满足需求状态:
      描述: 小人正在执行满足自身生理/心理需求的行为
      子状态:
        进食中:
          描述: 小人坐在地上吃包装食品
          行为: 进食动画
          退出条件: 饱食度恢复
        休息中:
          描述: 小人在床上睡觉
          行为: 睡眠动画
          退出条件: 精力值恢复满或天亮

状态转换规则:
  空闲 -> 移动:
    条件: 检测到可执行的工作，或产生需求
    目标状态: 移动到工作目标、食物或床铺位置
  移动 -> 执行工作:
    条件: 到达工作目标位置
    目标状态: 根据工作类型进入对应子状态
  移动 -> 满足需求:
    条件: 到达食物或床铺位置
    目标状态: 进入进食中或休息中子状态
  执行工作 -> 移动:
    条件: 工作完成且有下一步行动（如搬运物资）
    目标状态: 移动到存储区
  执行工作 -> 空闲:
    条件: 工作完成且无其他工作
    目标状态: 漫无目的散步
  满足需求 -> 空闲:
    条件: 需求已被满足
    目标状态: 漫无目的散步
  任意状态 -> 移动 (需求打断):
    条件: 饱食度或精力值低于阈值（需求优先级高于普通工作）
    目标状态: 放弃当前工作，移动去寻找食物或床铺

漫无目的散步:
  描述: |
    小人在空闲状态下的默认行为。
    小人会在地图上随机移动。
  行为特征:
    移动方式: 随机选择相邻地图格移动
    移动频率: 待配置
    可打断: 是，检测到工作或需求立即停止
  实现要点:
    - 小人不需要玩家指令
    - 散步不产生任何工作成果
    - 散步范围可在地图可行走区域内

工作决策:
  描述: 小人如何决定执行哪项工作
  决策因素:
    - 需求状态（饥饿、疲劳优先级最高）
    - 工作优先级
    - 与小人的距离
    - 小人当前携带状态
  决策流程:
    - 优先检查自身需求，若有紧迫需求则优先满足
    - 空闲小人检测工作队列
    - 根据决策因素选择最优工作
    - 开始移动到工作目标

行为与时间的关系:
  描述: 小人行为随时间推进
  时间推进:
    方式: 游戏时间实时推进
    影响: 读条时间、移动时间、需求下降等
  第一天初始:
    时间: 白天
    状态: 所有小人从地图中醒来
    默认行为: 漫无目的散步