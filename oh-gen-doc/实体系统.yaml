# 实体系统设计文档
# 维度：定义游戏中所有实体类型及其属性

实体类型:
  小人:
    描述: |
      游戏中的主要角色单位，由玩家间接控制。
      小人会根据当前状态和可用工作自动执行行为。
    属性:
      位置:
        类型: 地图格坐标
        描述: 小人当前所在的地图格位置
      状态:
        类型: 枚举
        可选值:
          - 漫无目的散步
          - 执行工作
        描述: 小人当前的行为状态
      携带物:
        类型: 物资引用
        可为空: true
        描述: 小人当前携带的物资（如有）
    行为能力:
      - 移动到指定地图格
      - 执行伐木工作
      - 拾取物资
      - 搬运物资到存储区
    初始状态:
      状态: 漫无目的散步
      生成方式: 游戏开始时从地图中醒来

  物资:
    描述: |
      可被小人拾取和搬运的游戏对象。
      物资可以散落在地图上，也可以被存储在存储区中。
    属性:
      类型:
        类型: 枚举
        可选值:
          - 初始物资
          - 木头
        描述: 物资的具体类型
      位置:
        类型: 地图格坐标
        描述: 物资当前所在的地图格位置
      所属存储区:
        类型: 存储区引用
        可为空: true
        描述: 物资所在的存储区（如有）
      可拾取状态:
        类型: 布尔值
        描述: 是否被玩家标记为可拾取
    状态变化:
      散落状态:
        描述: 物资散落在地图上，等待被拾取
        条件: 未被拾取且不在存储区中
      存储状态:
        描述: 物资已被搬运到存储区中
        条件: 位于某个存储区内
      携带状态:
        描述: 物资被小人携带中
        条件: 被小人拾取后尚未放下

  树木:
    描述: |
      地图上的自然资源，可被玩家标记为伐木目标。
      伐木完成后会变成木头物资。
    属性:
      位置:
        类型: 地图格坐标
        描述: 树木所在的地图格位置
      伐木状态:
        类型: 枚举
        可选值:
          - 正常
          - 已标记伐木
          - 伐木中
        描述: 树木当前的伐木相关状态
    交互:
      标记伐木:
        触发: 玩家使用伐木工具框选
        效果: 伐木状态变为"已标记伐木"
      伐木完成:
        触发: 小人在树旁边读条结束
        效果: 树木消失，生成木头物资

实体关系:
  小人-物资:
    关系类型: 拾取/携带
    描述: 小人可以拾取散落的物资并携带
  小人-树木:
    关系类型: 工作目标
    描述: 小人可以执行伐木工作
  物资-存储区:
    关系类型: 归属
    描述: 物资可以被存储在存储区中
