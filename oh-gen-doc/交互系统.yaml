# 交互系统设计文档
# 维度：定义玩家输入方式和游戏交互机制

玩家输入:
  选区工具:
    描述: |
      核心交互工具，用于框选地图格并执行相应操作。
      玩家通过拖拽鼠标框选矩形区域。
    操作方式:
      开始选择: 鼠标按下
      框选过程: 鼠标拖拽显示选区范围
      确认选择: 鼠标释放
    输出:
      类型: 地图格坐标列表
      描述: 返回被框选的所有地图格

  蓝图笔刷:
    描述: 用于在地图上连续绘制建筑蓝图的工具
    操作方式:
      开始绘制: 鼠标按下
      绘制过程: 鼠标拖拽，在划过的路径上显示建筑虚影
      确认绘制: 鼠标释放
    输出:
      类型: 地图格坐标列表
      描述: 返回需要生成蓝图的地图格位置

  菜单选择:
    描述: 通过菜单层级进行功能选择
    菜单层级:
      区域:
        子菜单:
          存储区 -> 新建
      建造:
        子菜单:
          墙 -> 木墙
      家具:
        操作列表:
          木床
    交互流程:
      - 玩家点击菜单项
      - 展开子菜单
      - 选择具体操作
      - 进入对应的操作模式

交互模式:
  存储区创建模式:
    触发: 玩家选择"区域-存储区-新建"
    操作: 使用选区工具框选地图格
    结果: 在框选位置创建新的存储区

  物资拾取标记模式:
    触发: 玩家选择物资拾取标记功能
    操作: 框选散落的物资
    结果: 被框选的物资标记为"可拾取"

  伐木标记模式:
    触发: 玩家选择伐木工具
    操作: 框选地图上的树木
    结果: 被框选的树木标记为"伐木"

  蓝图绘制模式:
    触发: 玩家选择"建造-墙-木墙"
    操作: 使用蓝图笔刷在地图上拖拽勾勒形状（如四方形）
    结果: 在划过的地图格上生成墙体蓝图虚影，并产生建造任务

  家具放置模式:
    触发: 玩家选择"家具-木床"
    操作: 在地图（通常是房间内）点击放置
    结果: 在指定位置生成木床蓝图，并产生建造任务

交互反馈:
  视觉反馈:
    选区显示:
      描述: 框选时显示半透明的选区范围
    蓝图虚影:
      描述: 绘制建筑或放置家具时，显示待建对象的半透明虚影
    标记显示:
      描述: 被标记的物资/树木显示对应的标记图标
    存储区显示:
      描述: 存储区在地图上有明显的边界标识
  状态提示:
    描述: 显示当前操作模式和可用操作提示

玩家决策流程:
  第一天流程:
    步骤一_建立存储区:
      操作: 选择"区域-存储区-新建"，框选地图格
    步骤二_标记物资:
      操作: 框选散落的物资
    步骤三_开始伐木:
      操作: 使用伐木工具框选树木
    步骤四_建造避难所:
      操作: 选择"建造-墙-木墙"，用蓝图笔刷勾勒房子
    步骤五_分配床铺:
      操作: 选择"家具-木床"，在房子内放置床铺