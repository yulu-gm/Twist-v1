# 需求系统设计文档
# 维度：定义小人的生理和心理需求及其影响

需求类型:
  饱食度:
    描述: 反映小人的饥饿状态
    机制:
      - 随时间自然下降
      - 当低于特定阈值时，小人会产生"饥饿"状态
      - 饥饿状态下，小人会主动寻找食物（如包装食品）并进食
      - 进食后饱食度恢复
  精力值:
    描述: 反映小人的疲劳状态
    机制:
      - 在白天活动时随时间自然下降
      - 当低于特定阈值（通常在晚上）时，小人会产生"疲劳"状态
      - 疲劳状态下，小人会寻找分配给自己的床铺进行休息/睡觉
      - 睡眠期间精力值逐渐恢复

需求驱动行为:
  进食行为:
    触发条件: 饱食度低于阈值
    执行流程:
      - 寻找可用的食物（如地上的包装食品）
      - 移动到食物所在位置
      - 拾取食物
      - 就地坐下进食
      - 进食完毕，恢复饱食度
  休息行为:
    触发条件: 精力值低于阈值（如到了晚上）
    执行流程:
      - 寻找属于自己的床铺
      - 移动到床铺位置
      - 躺下休息
      - 精力值恢复后（或到了白天）醒来