# 地图系统设计文档
# 维度：定义地图结构、区域划分和位置管理

地图格:
  描述: |
    地图的基本组成单元，每个地图格可以有位置坐标。
    地图格可以包含实体（小人、物资、树木等）。
  属性:
    坐标:
      类型: 二维坐标 (x, y)
      描述: 地图格在地图上的唯一位置标识
    包含实体:
      类型: 实体引用列表
      可为空: true
      描述: 当前位于该地图格上的所有实体
  状态:
    可通行:
      描述: 小人可以通过该地图格
      默认值: true
    被选中:
      描述: 是否被玩家的选区工具框选
      默认值: false

区域系统:
  存储区:
    描述: |
      由玩家创建的指定区域，用于存放物资。
      存储区由一组连续或非连续的地图格组成。
    属性:
      名称:
        类型: 字符串
        描述: 存储区的标识名称
      包含地图格:
        类型: 地图格坐标列表
        描述: 存储区所覆盖的所有地图格
      存储的物资:
        类型: 物资引用列表
        描述: 当前存储在该区域内的所有物资
    创建流程:
      步骤:
        - 玩家选择菜单项: 区域 -> 存储区 -> 新建
        - 玩家使用选区工具框选地图格
        - 系统创建新的存储区对象
        - 存储区显示在地图上（可视化表示）

选区工具:
  描述: |
    用于在地图上框选一组地图格的工具。
    可用于创建存储区、标记物资可拾取、标记树木伐木等操作。
  使用方式:
    框选:
      描述: 玩家拖拽鼠标框选矩形区域内的地图格
      效果: 返回被框选的地图格坐标列表
  应用场景:
    - 创建存储区时框选地图格
    - 框选散落的物资标记为可拾取
    - 框选树木标记为伐木目标

地图初始化:
  描述: 游戏开始时地图的初始状态
  初始内容:
    小人生成:
      数量: 所有小人
      状态: 从地图中醒来
      时间: 一天的白天
    物资分布:
      描述: 初始物资散落在地图上
      状态: 散落状态，未被标记可拾取
    树木分布:
      描述: 地图上有若干树木
      状态: 正常状态，未被标记伐木
    岩石分布:
      描述: 地图上有若干岩石
      状态: 正常状态，未被标记开采
