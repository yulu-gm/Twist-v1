# 建筑系统设计文档
# 维度：定义建筑物的建造流程、蓝图机制和家具分配

建筑类型:
  墙体:
    描述: 构成房间和避难所的基础结构
    材质: 木墙等
    建造方式: 通过蓝图笔刷在地图上拖拽绘制连续的墙体蓝图
  家具:
    描述: 放置在建筑物内部的设施
    子类:
      木床:
        描述: 供小人休息的家具
        特性: 建成后会自动分配给还没有床的小人

建造流程:
  蓝图阶段:
    描述: 玩家规划建筑位置后，在地图上生成虚影形式的蓝图
    特性:
      - 蓝图本身没有碰撞体积（待确认风险：是否阻挡通行）
      - 蓝图会生成对应的建造工作任务
  施工阶段:
    描述: 小人接取建造工作后，前往蓝图位置进行施工
    机制:
      - 小人在蓝图旁读条增加工作进度
      - 需要消耗对应的材料（待确认风险：story中未明确提及消耗木头，仅提及工作进度结束后建成）
  完成阶段:
    描述: 工作进度结束后，蓝图转化为真实的建筑实体

床铺分配机制:
  描述: 管理小人与床铺的归属关系
  自动分配:
    触发时机: 新的床铺建造完成时
    规则: 系统会自动查找当前还没有分配床铺的小人，并将新床铺分配给该小人
  归属状态:
    描述: 每张床最多归属一名小人，小人休息时优先寻找自己的床